<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meow Track — Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet" />
  <style>

/* ===== meow_style.css ===== */
/* ============================================================
   Meow Track — clean nutrition tracker design system
   Orange + yellow accents, Plus Jakarta Sans, light/dark
   ============================================================ */

:root {
  --accent:      #F2742E;   /* primary orange */
  --accent-d:    #E15F1B;
  --accent-l:    #FF8E4D;
  --accent-wash: #FFEDE1;
  --yellow:      #F5B53D;   /* secondary */
  --yellow-d:    #E29C1B;
  --yellow-wash: #FDF1D9;

  /* macro hues (match the reference) */
  --carbs:    #1FA463;  --carbs-wash:  #DCF3E8;
  --protein:  #2F6FED;  --protein-wash:#DEE9FD;
  --fat:      #F5B53D;  --fat-wash:    #FDF1D9;
  --water:    #4AA8E0;  --water-wash:  #DCEEFA;

  --teal:     #16C8A8;

  --r-2xl: 30px;
  --r-xl:  24px;
  --r-lg:  18px;
  --r-md:  14px;
  --r-sm:  10px;

  --font: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
}

/* ---- LIGHT (default) ---- */
[data-theme="light"], :root {
  --bg:        #F4F5F7;   /* app background behind cards */
  --surface:   #FFFFFF;
  --surface-2: #F7F8FA;
  --well:      #F1F3F6;
  --ink:       #16202E;   /* near-black navy */
  --ink-soft:  #5A6675;
  --muted:     #97A1AD;
  --line:      #ECEEF2;
  --line-2:    #E0E4EA;
  --bezel:     #0B0D12;
  --frame-edge:#23262F;
  --shadow:    0 1px 2px rgba(20,28,40,.04), 0 10px 30px -16px rgba(20,28,40,.16);
  --shadow-sm: 0 1px 2px rgba(20,28,40,.05), 0 4px 14px -10px rgba(20,28,40,.18);
  --shadow-lg: 0 4px 8px rgba(20,28,40,.06), 0 28px 56px -24px rgba(20,28,40,.32);
  --scrim:     rgba(15,20,30,.42);
}

/* ---- DARK ---- */
[data-theme="dark"] {
  --bg:        #0E1320;
  --surface:   #171D2B;
  --surface-2: #1E2536;
  --well:      #222A3C;
  --ink:       #F2F5F9;
  --ink-soft:  #A4AEBE;
  --muted:     #6B7689;
  --line:      #252D3D;
  --line-2:    #2E3749;
  --bezel:     #000000;
  --frame-edge:#2A2E38;
  --accent-wash: #3A2516;
  --yellow-wash: #3A2F12;
  --carbs-wash:  #14301F;
  --protein-wash:#162543;
  --fat-wash:    #3A2F12;
  --water-wash:  #132A3C;
  --shadow:    0 1px 2px rgba(0,0,0,.3), 0 12px 32px -16px rgba(0,0,0,.6);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3), 0 6px 16px -10px rgba(0,0,0,.5);
  --shadow-lg: 0 6px 12px rgba(0,0,0,.4), 0 30px 60px -24px rgba(0,0,0,.7);
  --scrim:     rgba(0,0,0,.55);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  background:
    radial-gradient(1200px 700px at 22% -8%, rgba(242,116,46,.12), transparent 60%),
    radial-gradient(1000px 700px at 110% 16%, rgba(245,181,61,.12), transparent 55%),
    #E9EBF0;
  color: var(--ink);
  display: grid;
  place-items: center;
  overflow: hidden;
}
[data-theme="dark"] body {
  background:
    radial-gradient(1200px 700px at 22% -8%, rgba(242,116,46,.16), transparent 60%),
    radial-gradient(1000px 700px at 110% 16%, rgba(245,181,61,.10), transparent 55%),
    #060912;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
h1,h2,h3,h4 { font-weight: 800; letter-spacing: -.02em; line-height: 1.08; color: var(--ink); }

/* ============================================================
   Stage + iPhone frame
   ============================================================ */
#stage { width: 100vw; height: 100dvh; overflow: hidden; }

.phone-scaler { position: fixed; top: 50%; left: 50%; transform-origin: center center; transform: translate(-50%, -50%); }

.phone {
  position: relative;
  width: 393px; height: 852px;     /* iPhone 16 logical pts */
  background: var(--bezel);
  border-radius: 56px;
  padding: 12px;
  box-shadow:
    0 0 0 2px var(--frame-edge),
    var(--shadow-lg),
    0 50px 90px -30px rgba(0,0,0,.5);
}
.phone::after { /* side buttons */
  content: ""; position: absolute; left: -3px; top: 168px; width: 3px; height: 64px;
  background: var(--frame-edge); border-radius: 3px 0 0 3px;
  box-shadow: 0 92px 0 var(--frame-edge), 0 168px 0 var(--frame-edge);
}
.phone::before {
  content: ""; position: absolute; right: -3px; top: 210px; width: 3px; height: 96px;
  background: var(--frame-edge); border-radius: 0 3px 3px 0;
}
.screen {
  position: relative; width: 100%; height: 100%;
  background: var(--bg); border-radius: 44px; overflow: hidden;
  color: var(--ink);
  display: flex; flex-direction: column;
}

/* Dynamic island */
.island {
  position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
  width: 122px; height: 35px; background: #000; border-radius: 999px; z-index: 60;
}

/* Status bar */
.statusbar {
  position: absolute; top: 0; left: 0; right: 0; height: 54px; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 30px 0; pointer-events: none;
}
.statusbar .time { font-weight: 800; font-size: 15.5px; color: var(--ink); letter-spacing: -.01em; }
.statusbar .sysicons { display: flex; align-items: center; gap: 6px; color: var(--ink); }
.statusbar svg { display: block; }
.statusbar .batt { display: flex; align-items: center; gap: 4px; font-weight: 800; font-size: 12px; }

/* Scroll viewport */
.view {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 60px 20px 118px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.view::-webkit-scrollbar { display: none; }
.view.no-pad { padding: 0; }

/* ============================================================
   Bottom tab bar + FAB
   ============================================================ */
.tabbar {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 40;
  height: 94px; padding: 8px 14px 26px;
  background: linear-gradient(180deg, transparent, var(--surface) 36%);
  display: grid; grid-template-columns: repeat(5, 1fr); align-items: start;
}
.tabbtn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding-top: 8px; color: var(--muted); font-weight: 700; font-size: 11px;
  transition: color .15s;
}
.tabbtn svg { width: 25px; height: 25px; }
.tabbtn.on { color: var(--ink); }
.tabbtn.on.tinted { color: var(--accent); }
.fab-slot { display: grid; place-items: center; }
.fab {
  width: 60px; height: 60px; border-radius: 999px; margin-top: -22px;
  background: var(--ink); color: var(--surface); display: grid; place-items: center;
  box-shadow: 0 10px 24px -8px rgba(15,20,30,.5), 0 0 0 6px var(--surface);
  transition: transform .16s cubic-bezier(.22,1.4,.5,1);
}
[data-theme="dark"] .fab { background: var(--accent); color: #fff; box-shadow: 0 10px 24px -8px var(--accent), 0 0 0 6px var(--surface); }
.fab svg { width: 28px; height: 28px; transition: transform .25s; }
.fab:active { transform: scale(.92); }
.fab.open svg { transform: rotate(45deg); }

/* ============================================================
   Cards & generic layout
   ============================================================ */
.card {
  background: var(--surface); border-radius: var(--r-xl);
  box-shadow: var(--shadow); padding: 20px;
}
.card.flat { box-shadow: none; border: 1px solid var(--line); }
.stack { display: flex; flex-direction: column; gap: 18px; }
.row { display: flex; align-items: center; }
.between { display: flex; align-items: center; justify-content: space-between; }
.spacer { flex: 1; }

.page-head { padding: 6px 2px 18px; }
.page-date { font-size: 14px; font-weight: 700; color: var(--ink-soft); margin-bottom: 2px; }
.page-title { font-size: 32px; font-weight: 800; letter-spacing: -.03em; color: var(--ink); }

.section-h { font-size: 19px; font-weight: 800; margin-bottom: 14px; color: var(--ink); }
.card-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-h h3 { font-size: 20px; font-weight: 800; }

.iconbtn {
  width: 40px; height: 40px; border-radius: var(--r-md); display: grid; place-items: center;
  background: var(--surface); border: 1px solid var(--line-2); color: var(--ink-soft);
  transition: background .15s, color .15s, transform .12s;
}
.iconbtn:active { transform: scale(.94); }
.iconbtn svg { width: 19px; height: 19px; }
.iconbtn.ghost { background: var(--well); border-color: transparent; }

.pill {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px;
  font-weight: 800; font-size: 12.5px; white-space: nowrap;
}
.pill.warn  { background: var(--yellow-wash); color: var(--yellow-d); }
.pill.good  { background: var(--carbs-wash);  color: var(--carbs); }
.pill.hot   { background: var(--accent-wash); color: var(--accent-d); }
.pill.info  { background: var(--water-wash);  color: #2C7BB0; }

/* ============================================================
   Buttons
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  padding: 16px 22px; border-radius: var(--r-lg); font-weight: 800; font-size: 16px;
  transition: transform .12s ease, background .18s, box-shadow .2s;
}
.btn svg { width: 20px; height: 20px; }
.btn:active { transform: translateY(1px) scale(.99); }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 10px 22px -10px var(--accent); }
.btn-primary:hover { background: var(--accent-d); }
.btn-dark { background: var(--ink); color: var(--surface); }
.btn-ghost { background: var(--well); color: var(--ink); }
.btn-ghost:hover { background: var(--line-2); }
.btn-line { background: var(--surface); border: 1.5px solid var(--line-2); color: var(--ink); }
.btn-block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-sm { padding: 11px 16px; font-size: 14px; border-radius: var(--r-md); }

/* ============================================================
   Inputs
   ============================================================ */
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 13.5px; font-weight: 800; color: var(--ink-soft); display: flex; align-items: center; gap: 7px; }
.field .dot { width: 9px; height: 9px; border-radius: 3px; flex: none; }
.input {
  width: 100%; background: var(--well); border: 1.5px solid transparent;
  border-radius: var(--r-md); padding: 15px 15px; font-size: 16px; font-weight: 700; color: var(--ink);
  transition: border-color .15s, background .15s, box-shadow .15s;
}
.input::placeholder { color: var(--muted); font-weight: 600; }
.input:focus { outline: none; border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 4px var(--accent-wash); }
.input-wrap { position: relative; }
.input-wrap .suffix { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: 800; color: var(--muted); pointer-events: none; }
.input.suffix-pad { padding-right: 52px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
textarea.input { resize: none; line-height: 1.5; }

/* segmented control */
.seg { display: flex; gap: 4px; background: var(--well); padding: 5px; border-radius: var(--r-md); }
.seg button { flex: 1; padding: 11px 10px; border-radius: 10px; font-weight: 800; font-size: 14px; color: var(--ink-soft); transition: all .15s; white-space: nowrap; }
.seg button.on { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }
.seg.dark button.on { color: var(--ink); }

/* toggle switch */
.switch { width: 50px; height: 30px; border-radius: 999px; background: var(--line-2); position: relative; transition: background .2s; flex: none; }
.switch.on { background: var(--accent); }
.switch::after { content: ""; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 999px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,.25); transition: transform .2s cubic-bezier(.3,1.5,.5,1); }
.switch.on::after { transform: translateX(20px); }

/* ============================================================
   Ring (donut)
   ============================================================ */
.ring-wrap { position: relative; display: grid; place-items: center; }
.ring-center { position: absolute; inset: 0; display: grid; place-content: center; text-align: center; }
.ring-center .lab { font-size: 14px; font-weight: 700; color: var(--ink-soft); }
.ring-center .big { font-size: 44px; font-weight: 800; letter-spacing: -.03em; line-height: 1; margin-top: 2px; }
.ring-center .unit { font-size: 13px; font-weight: 700; color: var(--muted); margin-top: 4px; }

/* macro bar */
.macro { display: flex; flex-direction: column; gap: 7px; }
.macro-top { display: flex; align-items: baseline; justify-content: space-between; }
.macro-name { font-weight: 800; font-size: 14px; }
.macro-val { font-weight: 700; font-size: 13px; color: var(--ink-soft); }
.macro-val b { color: var(--ink); }
.bar { height: 8px; border-radius: 999px; background: var(--well); overflow: hidden; }
.bar > span { display: block; height: 100%; border-radius: 999px; transition: width .7s cubic-bezier(.22,1,.36,1); }
.over { color: var(--accent-d) !important; }

/* stat with mini ring */
.macro3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.macro3 .m { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
.macro3 .emoji { font-size: 22px; }
.macro3 .mk { font-weight: 800; font-size: 14px; }
.macro3 .mv { font-weight: 700; font-size: 13px; color: var(--ink-soft); }

/* legend row */
.legend { display: flex; gap: 16px; flex-wrap: wrap; }
.legend .lg { display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 13.5px; color: var(--ink-soft); }
.legend .lg .sw { width: 13px; height: 13px; border-radius: 4px; }

/* ============================================================
   Lists / meal rows
   ============================================================ */
.list { display: flex; flex-direction: column; }
.mealrow { display: flex; align-items: center; gap: 13px; padding: 13px 0; border-top: 1px solid var(--line); }
.mealrow:first-child { border-top: none; }
.mealrow .thumb { width: 52px; height: 52px; border-radius: 14px; object-fit: cover; flex: none; background: var(--well); display: grid; place-items: center; font-size: 24px; }
.mealrow .mbody { flex: 1; min-width: 0; }
.mealrow .mname { font-weight: 800; font-size: 15.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mealrow .msub { font-size: 13px; font-weight: 600; color: var(--muted); margin-top: 2px; }
.mealrow .mmacros { display: flex; gap: 12px; margin-top: 5px; font-size: 13px; font-weight: 700; color: var(--ink-soft); }
.mealrow .mcal { font-weight: 800; font-size: 16px; white-space: nowrap; }
.mealrow .mcal small { font-size: 12px; color: var(--muted); font-weight: 700; }

.logfood { display: flex; align-items: center; gap: 9px; padding: 14px 2px 4px; color: var(--accent-d); font-weight: 800; font-size: 15px; }
.logfood svg { width: 19px; height: 19px; }

.meal-group-h { display: flex; align-items: baseline; justify-content: space-between; margin: 4px 0 6px; }
.meal-group-h .gname { font-size: 18px; font-weight: 800; }
.meal-group-h .gcal { font-size: 18px; font-weight: 800; }

/* ============================================================
   Bottom sheet (add menu, modals)
   ============================================================ */
.sheet-scrim {
  position: absolute; inset: 0; z-index: 70; background: var(--scrim);
  opacity: 0; pointer-events: none; transition: opacity .26s;
}
.sheet-scrim.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 71;
  background: var(--surface); border-radius: 30px 30px 0 0;
  padding: 12px 20px calc(26px + env(safe-area-inset-bottom));
  transform: translateY(105%); transition: transform .3s cubic-bezier(.22,1,.36,1);
  max-height: 92%; overflow-y: auto; scrollbar-width: none;
  box-shadow: 0 -10px 40px -16px rgba(0,0,0,.3);
}
.sheet::-webkit-scrollbar { display: none; }
.sheet.show { transform: translateY(0); }
.sheet.full { top: 0; bottom: 0; border-radius: 0; max-height: none; padding-top: 56px; }
.grabber { width: 40px; height: 5px; border-radius: 999px; background: var(--line-2); margin: 0 auto 14px; }
.sheet-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.sheet-h h3 { font-size: 22px; font-weight: 800; }

/* quick-action grid in add sheet */
.qa-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 12px; }
.qa {
  display: flex; flex-direction: column; align-items: center; gap: 9px; padding: 6px 2px;
}
.qa .ico { width: 64px; height: 64px; border-radius: 50%; display: grid; place-items: center; border: 1.5px solid var(--line-2); color: var(--accent); transition: transform .12s, background .15s; }
.qa:active .ico { transform: scale(.92); }
.qa .ico svg { width: 26px; height: 26px; }
.qa span { font-weight: 700; font-size: 12.5px; text-align: center; color: var(--ink); line-height: 1.2; }
.qa-wide { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.qa-card {
  display: flex; align-items: center; gap: 12px; padding: 16px; border-radius: var(--r-lg);
  border: 1.5px solid var(--line); background: var(--surface); transition: transform .12s, border-color .15s;
}
.qa-card:active { transform: scale(.98); }
.qa-card .ico { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; flex: none; }
.qa-card .ico svg { width: 22px; height: 22px; }
.qa-card span { font-weight: 800; font-size: 15px; }

/* ============================================================
   Onboarding
   ============================================================ */
.ob { padding: 60px 24px 40px; min-height: 100%; display: flex; flex-direction: column; }
.ob-hero { text-align: center; margin-bottom: 22px; }
.ob-wave { font-size: 40px; }
.ob h1 { font-size: 30px; line-height: 1.12; margin-top: 6px; }
.ob-prog { display: flex; gap: 6px; margin-bottom: 26px; }
.ob-prog i { flex: 1; height: 5px; border-radius: 999px; background: var(--line-2); }
.ob-prog i.on { background: var(--accent); }
.choice {
  display: flex; align-items: center; gap: 14px; padding: 18px; border-radius: var(--r-lg);
  border: 2px solid var(--line); background: var(--surface); transition: all .14s; text-align: left; width: 100%;
}
.choice:active { transform: scale(.99); }
.choice.on { border-color: var(--accent); background: var(--accent-wash); }
.choice .c-emoji { font-size: 26px; flex: none; }
.choice .c-t { display: block; font-weight: 800; font-size: 16px; }
.choice .c-s { display: block; font-size: 13px; font-weight: 600; color: var(--ink-soft); margin-top: 3px; line-height: 1.35; }
.choice .c-check { margin-left: auto; width: 24px; height: 24px; border-radius: 999px; border: 2px solid var(--line-2); display: grid; place-items: center; color: #fff; flex: none; }
.choice.on .c-check { background: var(--accent); border-color: var(--accent); }
.choice.on .c-check svg { width: 14px; height: 14px; }

/* baseline rows */
.baserow { display: flex; align-items: center; gap: 14px; padding: 16px 2px; border-top: 1px solid var(--line); }
.baserow:first-child { border-top: none; }
.baserow .bk { font-weight: 800; font-size: 16px; }
.baserow .bv { font-size: 14px; font-weight: 600; color: var(--ink-soft); margin-top: 2px; }
.baserow .chev { margin-left: auto; color: var(--muted); }
.baserow .chev svg { width: 18px; height: 18px; }

/* ============================================================
   Account list
   ============================================================ */
.acct-group { font-size: 14px; font-weight: 700; color: var(--muted); margin: 22px 2px 10px; }
.acct-card { background: var(--surface); border-radius: var(--r-xl); box-shadow: var(--shadow); overflow: hidden; }
.acct-row { display: flex; align-items: center; gap: 15px; padding: 17px 18px; border-top: 1px solid var(--line); width: 100%; text-align: left; transition: background .14s; }
.acct-row:first-child { border-top: none; }
.acct-row:active { background: var(--well); }
.acct-row .ai { width: 30px; display: grid; place-items: center; color: var(--ink); flex: none; }
.acct-row .ai svg { width: 23px; height: 23px; }
.acct-row .at { font-weight: 800; font-size: 16px; flex: 1; }
.acct-row .chev { color: var(--muted); }
.acct-row .chev svg { width: 18px; height: 18px; }

.referral {
  display: flex; align-items: center; gap: 14px; padding: 18px;
  border-radius: var(--r-xl); border: 1.5px solid var(--accent);
  background: linear-gradient(120deg, var(--accent-wash), var(--yellow-wash));
}
.referral .gift { font-size: 30px; }
.referral .rt { font-size: 18px; font-weight: 800; }
.referral .rs { font-size: 13.5px; font-weight: 600; color: var(--ink-soft); margin-top: 3px; line-height: 1.4; }

/* ============================================================
   Misc
   ============================================================ */
.banner { border-radius: var(--r-md); padding: 13px 15px; font-weight: 700; font-size: 14px; display: flex; gap: 9px; align-items: flex-start; line-height: 1.45; }
.banner svg { width: 18px; height: 18px; flex: none; margin-top: 1px; }
.banner.warn { background: var(--yellow-wash); color: var(--yellow-d); }
.banner.info { background: var(--water-wash); color: #2C7BB0; }
.banner.hot  { background: var(--accent-wash); color: var(--accent-d); }

.spin { width: 20px; height: 20px; border: 2.5px solid var(--accent-wash); border-top-color: var(--accent); border-radius: 999px; animation: spin .7s linear infinite; flex: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: absolute; left: 50%; bottom: 110px; transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: var(--surface); padding: 13px 20px; border-radius: 999px;
  font-weight: 800; font-size: 14px; box-shadow: var(--shadow-lg); z-index: 90;
  display: flex; align-items: center; gap: 9px; opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; max-width: 84%;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast svg { width: 17px; height: 17px; color: var(--teal); flex: none; }

.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty .e-emoji { font-size: 40px; }
.empty p { font-weight: 700; font-size: 14.5px; margin-top: 10px; }

.drop {
  border: 2px dashed var(--line-2); border-radius: var(--r-lg);
  background: var(--well); padding: 30px 20px; text-align: center; transition: all .18s; cursor: pointer;
}
.drop.over { border-color: var(--accent); background: var(--accent-wash); }
.drop .ico { width: 58px; height: 58px; border-radius: 18px; background: var(--accent-wash); color: var(--accent); display: grid; place-items: center; margin: 0 auto 12px; }
.drop .ico svg { width: 28px; height: 28px; }
.drop h4 { font-size: 16px; }
.drop p { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 5px; }

.preview { position: relative; border-radius: var(--r-lg); overflow: hidden; }
.preview img { width: 100%; display: block; max-height: 240px; object-fit: cover; }
.preview .x { position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; border-radius: 999px; background: rgba(0,0,0,.55); color: #fff; display: grid; place-items: center; backdrop-filter: blur(4px); }
.preview .x svg { width: 16px; height: 16px; }

.analyzing { display: flex; align-items: center; gap: 12px; justify-content: center; padding: 18px; font-weight: 800; color: var(--accent-d); }

/* editable food name + ingredients */
.name-edit {
  width: 100%; font-family: inherit; font-weight: 800; font-size: 18px; line-height: 1.2; color: var(--ink);
  background: transparent; border: none; border-bottom: 1.5px dashed transparent; padding: 1px 2px; margin: -1px 0; border-radius: 4px;
  transition: border-color .15s, background .15s;
}
.name-edit:hover { border-bottom-color: var(--line-2); }
.name-edit:focus { outline: none; border-bottom-color: var(--accent); background: var(--well); }
.ing-list { display: flex; flex-direction: column; gap: 8px; }
.ing-row { display: flex; align-items: center; gap: 10px; }
.ing-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--accent); flex: none; }
.ing-input {
  flex: 1; min-width: 0; font-family: inherit; font-weight: 700; font-size: 14.5px; color: var(--ink);
  background: var(--well); border: 1.5px solid transparent; border-radius: 10px; padding: 10px 12px;
  transition: border-color .15s, background .15s;
}
.ing-input::placeholder { color: var(--muted); font-weight: 600; }
.ing-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
.ing-x { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; color: var(--muted); background: var(--well); flex: none; transition: background .15s, color .15s; }
.ing-x:hover { background: var(--accent-wash); color: var(--accent-d); }
.ing-add { display: flex; gap: 8px; margin-top: 12px; }
.ing-add .ing-input { background: var(--surface); border-color: var(--line-2); }
.ing-add .btn { flex: none; }
.ing-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.ing-chip { font-size: 11.5px; font-weight: 700; color: var(--ink-soft); background: var(--well); border-radius: 999px; padding: 3px 9px; }

/* pop animation */
@keyframes pop { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
.pop { animation: pop .42s cubic-bezier(.22,1,.36,1) both; }
.pop-2 { animation-delay: .07s; }
.pop-3 { animation-delay: .14s; }
.pop-4 { animation-delay: .21s; }

/* health analysis card */
.health-card { border-radius: var(--r-lg); border: 1px solid var(--line); overflow: hidden; }
.health-h { display: flex; align-items: center; gap: 9px; padding: 13px 15px; font-weight: 800; font-size: 14px; background: var(--well); }
.health-h svg { width: 18px; height: 18px; color: var(--accent); }
.health-body { padding: 14px 15px; }
.nutri-row { display: flex; align-items: center; gap: 11px; padding: 9px 0; }
.nutri-row .nk { font-weight: 800; font-size: 14px; width: 92px; flex: none; }
.nutri-row .nbar { flex: 1; height: 7px; border-radius: 999px; background: var(--well); overflow: hidden; }
.nutri-row .nbar > span { display: block; height: 100%; border-radius: 999px; }
.nutri-row .nv { font-weight: 700; font-size: 13px; color: var(--ink-soft); white-space: nowrap; }

/* chart */
.chart { position: relative; }
.chart svg { display: block; width: 100%; overflow: visible; }
.gridline { stroke: var(--line); stroke-width: 1; stroke-dasharray: 3 4; }
.axis-lab { fill: var(--muted); font-size: 11px; font-weight: 700; font-family: var(--font); }

/* ============================================================
   Date bar + month calendar (diary)
   ============================================================ */
.datebar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.datepick { flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px; padding: 12px 14px; border-radius: var(--r-md); background: var(--surface); border: 1.5px solid var(--line-2); font-weight: 800; font-size: 14.5px; color: var(--ink); box-shadow: var(--shadow-sm); transition: border-color .14s; }
.datepick:hover { border-color: var(--accent); }

.mcal { user-select: none; }
.mcal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.mcal-title { font-weight: 800; font-size: 16px; }
.mcal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
.mcal-dow span { text-align: center; font-size: 11px; font-weight: 800; color: var(--muted); padding: 4px 0; }
.mcal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.mcal-day { position: relative; aspect-ratio: 1; display: grid; place-items: center; border-radius: 11px; font-weight: 700; font-size: 14px; color: var(--ink); transition: background .12s, color .12s; }
.mcal-day:hover { background: var(--well); }
.mcal-day.today { color: var(--accent-d); box-shadow: inset 0 0 0 2px var(--accent-l); }
.mcal-day.sel { background: var(--accent); color: #fff; }
.mcal-day .mcal-dot { position: absolute; bottom: 5px; width: 5px; height: 5px; border-radius: 999px; background: var(--carbs); }
.mcal-day.sel .mcal-dot { background: #fff; }
.mcal-foot { display: flex; justify-content: center; margin-top: 12px; }

.daydot { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 999px; }
.web-day-strip button { position: relative; }

/* period tabs (insight) */
.period-tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 14px; padding: 5px; box-shadow: var(--shadow-sm); overflow-x: auto; scrollbar-width: none; }
.period-tabs::-webkit-scrollbar { display: none; }
.period-tabs button { flex: 1 0 auto; white-space: nowrap; padding: 10px 14px; border-radius: 10px; font-weight: 800; font-size: 12.5px; color: var(--muted); background: transparent; transition: all .14s; }
.period-tabs button.on { background: var(--well); color: var(--ink); }
.period-range { font-size: 13.5px; font-weight: 700; color: var(--muted); margin: 12px 2px 0; }

/* ============================================================
   Meow Track for Professional
   ============================================================ */
.pro-intro { border-radius: var(--r-xl); padding: 20px; background: linear-gradient(135deg, var(--accent-wash), var(--yellow-wash)); border: 1px solid var(--line); }
.pro-intro .pi-t { font-size: 19px; font-weight: 800; }
.pro-intro .pi-s { font-size: 13.5px; font-weight: 600; color: var(--ink-soft); margin-top: 3px; line-height: 1.4; }
.pro-stat { display: flex; align-items: center; gap: 16px; background: var(--surface); border-radius: var(--r-lg); padding: 15px 18px; }
.pro-stat .ps-k { font-size: 12px; font-weight: 700; color: var(--muted); }
.pro-stat .ps-v { font-size: 18px; font-weight: 800; margin-top: 3px; }
.pro-stat .ps-div { width: 1px; align-self: stretch; background: var(--line-2); }

.rec-badge { display: inline-flex; align-items: center; gap: 7px; align-self: flex-start; padding: 8px 14px; border-radius: 999px; background: var(--accent-wash); color: var(--accent-d); font-weight: 800; font-size: 12.5px; }
.rec-badge svg { color: var(--accent); }

.pro-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 18px; box-shadow: var(--shadow-sm); }
.pro-top { display: flex; gap: 13px; align-items: flex-start; }
.pro-av { width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center; font-size: 30px; flex: none; }
.pro-name { display: flex; align-items: center; gap: 7px; font-weight: 800; font-size: 16.5px; }
.pro-name .verified { width: 17px; height: 17px; border-radius: 999px; background: var(--protein); color: #fff; display: grid; place-items: center; flex: none; }
.pro-title { font-size: 13px; font-weight: 700; color: var(--ink-soft); margin-top: 2px; }
.pro-meta { display: flex; flex-wrap: wrap; gap: 4px 7px; align-items: center; margin-top: 6px; font-size: 12.5px; font-weight: 700; color: var(--muted); }
.pro-meta span { white-space: nowrap; }
.pro-meta .star { color: var(--yellow-d); }
.pro-price { text-align: right; font-weight: 800; font-size: 17px; flex: none; }
.pro-price small { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 1px; }
.pro-blurb { font-size: 13.5px; font-weight: 600; color: var(--ink-soft); line-height: 1.45; margin: 13px 0 12px; }
.pro-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 15px; }
.pro-tags span { padding: 5px 11px; border-radius: 999px; background: var(--well); color: var(--ink-soft); font-weight: 700; font-size: 12px; }
.pro-actions { display: grid; grid-template-columns: 1fr auto; gap: 9px; }

/* ============================================================
   Health sync (Integrations + Activity logging)
   ============================================================ */
.prov-tile { border-radius: 12px; display: grid; place-items: center; flex: none; }
.act-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.act-stat { background: var(--well); border-radius: 14px; padding: 14px 10px; text-align: center; }
.act-stat .as-v { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
.act-stat .as-k { font-size: 12px; font-weight: 700; color: var(--muted); margin-top: 3px; }
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.metric { display: flex; align-items: center; gap: 10px; background: var(--well); border-radius: 12px; padding: 11px 12px; }
.metric .me { font-size: 20px; flex: none; }
.metric .mk { font-size: 11.5px; font-weight: 700; color: var(--muted); }
.metric .mv { font-size: 14.5px; font-weight: 800; margin-top: 1px; }

.connect-screen { display: grid; place-items: center; padding: 8px 0; }
.connect-card { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 24px 22px; box-shadow: var(--shadow); }
.connect-brand { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 6px; }
.connect-link { width: 30px; height: 30px; border-radius: 999px; background: var(--well); color: var(--muted); display: grid; place-items: center; }
.scope-list { display: flex; flex-direction: column; gap: 9px; }
.scope-row { display: flex; align-items: center; gap: 11px; font-weight: 700; font-size: 14px; color: var(--ink); }
.scope-check { width: 22px; height: 22px; border-radius: 999px; background: var(--carbs-wash); color: var(--carbs); display: grid; place-items: center; flex: none; }
.connect-note { display: flex; gap: 8px; align-items: flex-start; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); font-size: 12px; font-weight: 600; color: var(--muted); line-height: 1.45; }
.connect-note svg { flex: none; margin-top: 1px; }

/* ============================================================
   Meow AI chat overlay
   ============================================================ */
.chat-overlay {
  position: absolute; inset: 0; z-index: 95; background: var(--bg);
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .32s cubic-bezier(.22,1,.36,1);
}
.chat-overlay.show { transform: translateY(0); }
.chat-head {
  flex: none; display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  background: var(--surface); border-bottom: 1px solid var(--line);
  padding-top: max(14px, env(safe-area-inset-top));
}
.chat-id { flex: 1; display: flex; align-items: center; gap: 11px; }
.chat-av { width: 42px; height: 42px; border-radius: 999px; background: linear-gradient(135deg, var(--accent), var(--yellow)); display: grid; place-items: center; font-size: 23px; flex: none; }
.chat-id .cn { font-weight: 800; font-size: 16px; }
.chat-id .cs { font-size: 12.5px; font-weight: 600; color: var(--carbs); }
.chat-body { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scrollbar-width: none; }
.chat-body::-webkit-scrollbar { display: none; }

.chat-welcome { text-align: center; margin: auto 0; padding: 20px 6px; }
.chat-welcome .cw-av { width: 76px; height: 76px; border-radius: 999px; margin: 0 auto 14px; background: linear-gradient(135deg, var(--accent-wash), var(--yellow-wash)); display: grid; place-items: center; font-size: 40px; }
.chat-welcome h3 { font-size: 21px; }
.chat-welcome p { font-size: 14.5px; font-weight: 600; color: var(--ink-soft); margin-top: 8px; line-height: 1.5; max-width: 280px; margin-inline: auto; }
.chat-suggest { display: flex; flex-direction: column; gap: 9px; margin-top: 20px; }
.chat-suggest button { padding: 13px 16px; border-radius: var(--r-md); background: var(--surface); border: 1.5px solid var(--line-2); font-weight: 700; font-size: 14px; color: var(--ink); text-align: left; transition: all .14s; }
.chat-suggest button:hover { border-color: var(--accent); background: var(--accent-wash); color: var(--accent-d); }

.msg { display: flex; gap: 9px; max-width: 86%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-av { width: 30px; height: 30px; border-radius: 999px; background: linear-gradient(135deg, var(--accent), var(--yellow)); display: grid; place-items: center; font-size: 16px; flex: none; align-self: flex-end; }
.bubble { padding: 12px 15px; border-radius: 18px; font-weight: 600; font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; }
.msg.ai .bubble { background: var(--surface); border: 1px solid var(--line); border-bottom-left-radius: 5px; color: var(--ink); }
.msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }

.bubble.typing { display: flex; gap: 5px; padding: 15px; }
.bubble.typing span { width: 8px; height: 8px; border-radius: 999px; background: var(--muted); animation: typing 1.2s infinite ease-in-out; }
.bubble.typing span:nth-child(2) { animation-delay: .18s; }
.bubble.typing span:nth-child(3) { animation-delay: .36s; }
@keyframes typing { 0%, 60%, 100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }

.chat-input-bar { flex: none; display: flex; align-items: flex-end; gap: 10px; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid var(--line); }
.chat-input { flex: 1; resize: none; max-height: 120px; background: var(--well); border: 1.5px solid transparent; border-radius: 20px; padding: 12px 16px; font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.4; transition: border-color .15s, background .15s; }
.chat-input::placeholder { color: var(--muted); font-weight: 600; }
.chat-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
.chat-send { width: 46px; height: 46px; border-radius: 999px; background: var(--accent); color: #fff; display: grid; place-items: center; flex: none; transition: transform .12s, background .15s; }
.chat-send:active { transform: scale(.92); }
.chat-send:disabled { background: var(--line-2); color: var(--muted); cursor: not-allowed; }

.ai-chip { display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 999px; font-weight: 800; font-size: 13px; background: var(--ink); color: var(--surface); }
.ai-chip svg { width: 15px; height: 15px; }
[data-theme="dark"] .ai-chip { background: var(--accent); color: #fff; }

@media (max-width: 440px) {
  .form-grid { grid-template-columns: 1fr; }
}


/* ===== meow_web.css ===== */
/* ============================================================
   Meow Track — Desktop / laptop website layer
   Loaded AFTER meow_style.css; reuses the same tokens.
   ============================================================ */

body.web {
  overflow: hidden;
}

/* ---- laptop scaler ---- */
.laptop-scaler { position: fixed; top: 50%; left: 50%; transform-origin: center center; transform: translate(-50%, -50%); }

/* ---- MacBook frame ---- */
.laptop { display: flex; flex-direction: column; align-items: center; }
.laptop-screen {
  position: relative;
  background: #0a0c11;
  padding: 16px 16px 18px;
  border-radius: 26px;
  box-shadow: 0 0 0 2px #2a2e38, 0 40px 80px -30px rgba(0,0,0,.6);
}
.laptop-cam { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 7px; height: 7px; border-radius: 50%; background: #1c2027; box-shadow: inset 0 0 0 1.5px #2f343d; }
.laptop-cam::after { content: ""; position: absolute; inset: 2px; border-radius: 50%; background: #3a4350; }

.browser {
  width: 1180px; height: 718px; border-radius: 9px; overflow: hidden;
  background: var(--bg); display: flex; flex-direction: column;
}
.browser-bar {
  height: 46px; flex: none; background: var(--surface-2); border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 14px; padding: 0 16px;
}
.lights { display: flex; gap: 8px; }
.lights i { width: 12px; height: 12px; border-radius: 50%; }
.lights i:nth-child(1){ background:#FF5F57; } .lights i:nth-child(2){ background:#FEBC2E; } .lights i:nth-child(3){ background:#28C840; }
.b-tabs { display: flex; gap: 8px; align-items: flex-end; height: 100%; padding-top: 8px; }
.b-tab { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: 9px 9px 0 0; padding: 8px 14px; font-size: 12.5px; font-weight: 700; color: var(--ink); max-width: 190px; white-space: nowrap; }
.b-tab .fav { font-size: 13px; }
.b-address {
  flex: 1; display: flex; align-items: center; gap: 9px; background: var(--bg);
  border-radius: 999px; padding: 8px 15px; font-size: 13px; font-weight: 600; color: var(--ink-soft);
  border: 1px solid var(--line); max-width: 460px; margin: 0 auto;
}
.b-address svg { width: 13px; height: 13px; color: var(--carbs); flex: none; }
.b-actions { display: flex; gap: 14px; color: var(--muted); margin-left: auto; }
.b-actions svg { width: 17px; height: 17px; }
.browser-body { flex: 1; overflow: hidden; position: relative; }

.laptop-base { position: relative; width: 1310px; height: 16px; background: linear-gradient(#d9dde3, #aab0b8 60%, #8b9099); border-radius: 0 0 12px 12px; box-shadow: 0 16px 26px -12px rgba(0,0,0,.45); }
.laptop-base::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 10px; background: #9197a0; border-radius: 0 0 10px 10px; }

/* ============================================================
   App layout: sidebar + main
   ============================================================ */
.web-app { display: grid; grid-template-columns: 246px 1fr; height: 100%; background: var(--bg); position: relative; color: var(--ink); }

.web-side {
  background: var(--surface); border-right: 1px solid var(--line);
  display: flex; flex-direction: column; padding: 22px 16px 18px;
}
.web-brand { display: flex; align-items: center; gap: 11px; padding: 4px 8px 20px; }
.web-brand .logo { width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(135deg, var(--accent), var(--yellow)); display: grid; place-items: center; font-size: 21px; flex: none; }
.web-brand .bn { font-size: 18px; font-weight: 800; letter-spacing: -.02em; }
.web-brand .bs { font-size: 11.5px; font-weight: 700; color: var(--muted); margin-top: -2px; }

.web-add { width: 100%; margin-bottom: 18px; }

.web-nav { display: flex; flex-direction: column; gap: 4px; }
.web-nav button {
  display: flex; align-items: center; gap: 13px; padding: 12px 14px; border-radius: 13px;
  font-weight: 700; font-size: 15px; color: var(--ink-soft); transition: background .14s, color .14s; text-align: left;
}
.web-nav button svg { width: 21px; height: 21px; flex: none; }
.web-nav button:hover { background: var(--well); color: var(--ink); }
.web-nav button.on { background: var(--accent-wash); color: var(--accent-d); }
.web-nav button.on svg { color: var(--accent); }

.web-side-foot { margin-top: auto; display: flex; flex-direction: column; gap: 12px; padding-top: 16px; }
.web-toggles { display: flex; gap: 8px; }
.web-toggles .seg { flex: 1; }
.web-toggles .seg button { padding: 9px 6px; font-size: 12.5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
.web-toggles .seg button svg { width: 14px; height: 14px; }
.web-profile { display: flex; align-items: center; gap: 11px; padding: 11px; border-radius: 14px; background: var(--well); cursor: pointer; transition: background .14s; }
.web-profile:hover { background: var(--line-2); }
.web-profile .av { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--yellow)); display: grid; place-items: center; font-size: 20px; flex: none; }
.web-profile .pn { font-weight: 800; font-size: 14.5px; }
.web-profile .ps { font-size: 12px; font-weight: 600; color: var(--ink-soft); }

/* ---- main ---- */
.web-main { overflow-y: auto; scrollbar-width: thin; }
.web-main::-webkit-scrollbar { width: 10px; }
.web-main::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; border: 3px solid var(--bg); }
.web-page { padding: 26px 36px 48px; max-width: 1180px; margin: 0 auto; }

.web-topbar { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 26px; }
.web-topbar .tt { font-size: 30px; font-weight: 800; letter-spacing: -.03em; }
.web-topbar .td { font-size: 14px; font-weight: 700; color: var(--ink-soft); margin-top: 3px; }
.web-topbar .actions { display: flex; align-items: center; gap: 12px; }

.go-prem { display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px; border-radius: 13px; font-weight: 800; font-size: 14px; color: #fff; background: linear-gradient(120deg, var(--accent), var(--yellow)); box-shadow: 0 8px 18px -8px var(--accent); }
.go-prem svg { width: 16px; height: 16px; }

.streak-chip { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 13px; background: var(--surface); border: 1px solid var(--line-2); font-weight: 800; font-size: 14px; box-shadow: var(--shadow-sm); }

/* ============================================================
   Grids
   ============================================================ */
.web-cols { display: grid; grid-template-columns: 1.6fr 1fr; gap: 22px; align-items: start; }
.web-cols > .col { display: flex; flex-direction: column; gap: 22px; min-width: 0; }
.web-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
.web-2 .span2 { grid-column: 1 / -1; }
.web-diary { display: grid; grid-template-columns: 360px 1fr; gap: 24px; align-items: start; }

.web-main .card { padding: 24px; }
.web-main .card-h h3 { font-size: 21px; }
.web-main .section-h { font-size: 20px; }

/* big calorie hero */
.cal-hero { display: grid; grid-template-columns: auto 1fr; gap: 30px; align-items: center; }
.cal-hero .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 14px; }

/* nutrition row of three radials sits naturally; make bars wider */
.web-main .macro3 { gap: 14px; }

/* meal cards on diary */
.web-day-strip { display: flex; gap: 8px; }
.web-day-strip button { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 12px 4px; border-radius: 14px; border: 2px solid var(--line); background: var(--surface); transition: all .14s; }
.web-day-strip button .dn { font-size: 12.5px; font-weight: 800; color: var(--muted); }
.web-day-strip button .dd { font-size: 17px; font-weight: 800; }
.web-day-strip button.on { border-color: var(--accent); background: var(--accent-wash); }
.web-day-strip button.on .dn, .web-day-strip button.on .dd { color: var(--accent-d); }
.web-day-strip button:disabled { opacity: .45; }

/* ============================================================
   Add modal
   ============================================================ */
.web-modal-scrim { position: absolute; inset: 0; z-index: 80; background: var(--scrim); display: grid; place-items: center; opacity: 0; pointer-events: none; transition: opacity .22s; padding: 30px; }
.web-modal-scrim.show { opacity: 1; pointer-events: auto; }
.web-modal { width: 560px; max-width: 100%; max-height: 90%; background: var(--surface); border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); transform: scale(.96) translateY(8px); transition: transform .24s cubic-bezier(.22,1,.36,1); }
.web-modal-scrim.show .web-modal { transform: none; }
.web-modal-h { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); flex: none; }
.web-modal-h h3 { font-size: 20px; }
.web-modal-body { overflow-y: auto; padding: 22px; scrollbar-width: thin; }
.web-modal-body::-webkit-scrollbar { width: 8px; }
.web-modal-body::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; }

/* onboarding centered */
.ob-web-wrap { position: absolute; inset: 0; display: grid; place-items: center; overflow: auto; padding: 28px;
  background: radial-gradient(900px 500px at 20% -5%, var(--accent-wash), transparent 60%), radial-gradient(800px 500px at 110% 10%, var(--yellow-wash), transparent 55%), var(--bg); }
.ob-web { width: 470px; max-width: 100%; background: var(--surface); border-radius: 28px; box-shadow: var(--shadow-lg); padding: 36px 36px 32px; }
.ob.ob-bare { padding: 0; min-height: auto; display: block; }
.ob.ob-bare .ob-prog { margin-bottom: 24px; }

/* desktop add quick grid spacing tweak */
.web-modal-body .qa-grid { gap: 14px; }
.web-modal-body .qa .ico { width: 70px; height: 70px; }

/* food ideas on web shouldn't stretch weirdly */
.web-main .referral { padding: 22px; }

   ============================================================ */
function Ring({ value, goal, size = 200, stroke = 18, color = "var(--accent)", track = "var(--well)", children, rounded = true }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = clampPct(value, goal) / 100;
  const over = goal > 0 && value > goal;
  return (
    <div className="ring-wrap" style={{ width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={over ? "var(--accent-d)" : color} strokeWidth={stroke} strokeLinecap={rounded ? "round" : "butt"}
          strokeDasharray={c} strokeDashoffset={c * (1 - pct)}
          style={{ transition: "stroke-dashoffset .9s cubic-bezier(.22,1,.36,1)" }} />
      </svg>
      <div className="ring-center">{children}</div>
    </div>
  );
}

function useToast() {

  const t = useRef();

/* ============================================================
   AI helpers (real calls via window.claude.complete)
   ============================================================ */
function extractJSON(text) {
  if (!text) return null;
  let t = String(text).trim().replace(/^```(?:json)?/i, "").replace(/```$/,"").trim();
  try { return JSON.parse(t); } catch {}
  const s = t.indexOf("{"), e = t.lastIndexOf("}");
  if (s >= 0 && e > s) { try { return JSON.parse(t.slice(s, e + 1)); } catch {} }
  return null;
}

async function aiComplete(prompt, imageDataURL) {
  if (!window.claude || !window.claude.complete) throw new Error("AI unavailable");
  let messages;
  if (imageDataURL) {
    const base64 = imageDataURL.split(",")[1];
    const media_type = (imageDataURL.match(/data:(.*?);/) || [])[1] || "image/jpeg";
    messages = [{ role: "user", content: [
      { type: "image", source: { type: "base64", media_type, data: base64 } },
      { type: "text", text: prompt },
    ]}];
    return await window.claude.complete({ messages });
  }
  return await window.claude.complete(prompt);
}

/* Estimate a food's nutrition. Returns normalized object or null. */
async function aiEstimateFood(query, imageDataURL) {
  const schema = '{"name":"short food name","serving":"portion description","cal":number,"carbs":number,"protein":number,"fat":number,"sugar":number,"sodium":number,"chol":number,"emoji":"single food emoji","ingredients":["3-8 main ingredients as short strings"],"note":"one short sentence on assumptions"}';
  const base = imageDataURL
    ? "Identify the food in this photo and estimate nutrition for the portion shown."
    : `Estimate the nutrition for: "${query}".`;
  const prompt = base + " Respond ONLY with strict minified JSON, no prose, no code fences, exactly: " + schema +
    " carbs/protein/fat/sugar in grams; sodium and chol(esterol) in mg; cal in kcal. ingredients: the main components you see/assume. Keep numbers realistic.";
  const reply = await aiComplete(prompt, imageDataURL);
  const j = extractJSON(reply);
  if (!j) return null;
  return {
    name: String(j.name || query || "Food"),
    serving: String(j.serving || "1 serving"),
    cal: round(+j.cal || 0), carbs: round1(+j.carbs || 0), protein: round1(+j.protein || 0), fat: round1(+j.fat || 0),
    sugar: round1(+j.sugar || 0), sodium: round(+j.sodium || 0), chol: round(+j.chol || 0),
    emoji: j.emoji || "🍽️", note: j.note || "",
    ingredients: Array.isArray(j.ingredients) ? j.ingredients.map((x) => String(x)).filter(Boolean).slice(0, 10) : [],
  };
}

function fileToDataURL(file) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
}
function downscale(dataURL, max = 768) {
  return new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      let { width: w, height: h } = img;
      if (Math.max(w, h) > max) { const s = max / Math.max(w, h); w = Math.round(w*s); h = Math.round(h*s); }
      const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(img, 0, 0, w, h);
      res(cv.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = () => res(dataURL);
    img.src = dataURL;
  });
}

/* nutrient flag levels for sugar/sodium/chol given a single serving */
function nutrientLevels(meal) {
  const lv = (v, hi, mid) => v >= hi ? "high" : v >= mid ? "ok" : "low";
  return {
    sugar: lv(+meal.sugar || 0, 20, 8),
    sodium: lv(+meal.sodium || 0, 600, 230),
    chol: lv(+meal.chol || 0, 150, 60),
  };
}

const MCAL_DOW = ["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"];
function MonthCalendar({ value, onPick, markedDays }) {
  const sel = parseKey(value);
  const [view, setView] = useState(() => new Date(sel.getFullYear(), sel.getMonth(), 1));
  const y = view.getFullYear(), m = view.getMonth();
  const startDow = (new Date(y, m, 1).getDay() + 6) % 7;   // Monday-first offset
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(y, m, d));
  const title = view.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
  const todayKey = dkey(TODAY);

  return (
    <div className="mcal">
      <div className="mcal-head">
        <button className="iconbtn ghost" onClick={() => setView(new Date(y, m - 1, 1))} aria-label="Previous month">{I.chevL({ width: 18, height: 18 })}</button>
        <div className="mcal-title">{title}</div>
        <button className="iconbtn ghost" onClick={() => setView(new Date(y, m + 1, 1))} aria-label="Next month">{I.chevR({ width: 18, height: 18 })}</button>
      </div>
      <div className="mcal-dow">{MCAL_DOW.map((d, i) => <span key={i}>{d}</span>)}</div>
      <div className="mcal-grid">
        {cells.map((c, i) => {
          if (!c) return <span key={i}></span>;
          const k = dkey(c);
          const marked = markedDays && markedDays.has(k);
          return (
            <button key={i} className={"mcal-day" + (k === value ? " sel" : "") + (k === todayKey ? " today" : "")} onClick={() => onPick(k)}>
              {c.getDate()}
              {marked && <span className="mcal-dot"></span>}
            </button>
          );
        })}
      </div>
      <div className="mcal-foot">
        <button className="btn btn-ghost btn-sm" onClick={() => { const t = new Date(TODAY); setView(new Date(t.getFullYear(), t.getMonth(), 1)); onPick(todayKey); }}>Today</button>
      </div>
    </div>
  );
}

/* shared weight-projection line chart (also reused on dashboard/insight) */
function WeightChart({ start, goal, units, height = 150, days = 7, points = null, showProjection = true }) {
  const W = 320, H = height, padL = 8, padR = 30, padT = 16, padB = 22;
  const lo = Math.min(start, goal) - 5, hi = Math.max(start, goal) + 2;
  const y = (v) => padT + (1 - (v - lo) / (hi - lo)) * (H - padT - padB);
  const xs = (i, n) => padL + (i / (n - 1)) * (W - padL - padR);
  const ticks = [hi - 1, (hi + lo) / 2, lo + 1].map(round);

  return (
    <div className="chart">
      <svg viewBox={`0 0 ${W} ${H}`}>
        {ticks.map((t, i) => (
          <g key={i}>
            <line className="gridline" x1={padL} y1={y(t)} x2={W - padR} y2={y(t)} />
            <text className="axis-lab" x={W - padR + 4} y={y(t) + 4}>{t}</text>
          </g>
        ))}
        {showProjection && (
          <>
            <line x1={xs(0,2)} y1={y(start)} x2={xs(1,2)} y2={y(goal)} stroke="url(#wgrad)" strokeWidth="3.5" strokeLinecap="round" />
            <defs><linearGradient id="wgrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stopColor="var(--yellow)"/><stop offset="1" stopColor="var(--accent)"/>
            </linearGradient></defs>
            <circle cx={xs(0,2)} cy={y(start)} r="5.5" fill="var(--yellow)" />
            <circle cx={xs(1,2)} cy={y(goal)} r="5.5" fill="var(--accent)" />

          </>
        )}
        {points && (
          <polyline fill="none" stroke="var(--accent)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"

function computePlan(p) {
  const bmr = 10 * p.weight + 6.25 * p.height - 5 * p.age + (p.sex === "male" ? 5 : -161);
  const tdee = bmr * p.activity;
  const delta = p.weight - p.goalWeight;
  const dir = Math.abs(delta) < 0.2 ? "maintain" : (delta > 0 ? "lose" : "gain");
  const dailyAdj = (p.pace || 0.5) * 7700 / 7;
  const floor = p.sex === "female" ? 1200 : 1500;
  let cal = Math.round(tdee);
  if (dir === "lose") cal = Math.max(Math.round(tdee - dailyAdj), floor);
  else if (dir === "gain") cal = Math.round(tdee + dailyAdj);
  const split = MACRO_SPLITS.highprotein;
  return {
    bmr: Math.round(bmr), tdee: Math.round(tdee), calories: cal, dir,
    carbs: Math.round(cal * split.carbs / 100 / 4),
    protein: Math.round(cal * split.protein / 100 / 4),
    fat: Math.round(cal * split.fat / 100 / 9),
    water: 2000,
    sugar: 36, sodium: 2300, cholesterol: 300,
  };
}

function bmiInfo(weight, heightCm) {
  const h = heightCm / 100; const bmi = h > 0 ? weight / (h * h) : 0;
  let cat = "—", color = "var(--muted)";
  if (bmi) {
    if (bmi < 18.5) { cat = "Underweight"; color = "var(--water)"; }
    else if (bmi < 23) { cat = "Healthy"; color = "var(--carbs)"; }
    else if (bmi < 27.5) { cat = "Overweight"; color = "var(--yellow-d)"; }
    else { cat = "Obese"; color = "var(--accent)"; }
  }
  return { bmi, cat, color };
}

function Onboarding({ onDone, units, setUnits, bare }) {
  const [step, setStep] = useState(0);
  const [p, setP] = useState({ ...DEFAULT_PROFILE, name: "", age: 0, height: 0, weight: 0, goalWeight: 0 });
  const set = (k, v) => setP((s) => ({ ...s, [k]: v }));
  const plan = useMemo(() => computePlan(p), [p]);
  const { bmi, cat, color } = bmiInfo(p.weight, p.height);
  const STEPS = 5;

  const next = () => setStep((s) => Math.min(STEPS - 1, s + 1));
  const back = () => setStep((s) => Math.max(0, s - 1));

  function finish() {
    const target = addDays(TODAY, Math.round((Math.abs(p.weight - p.goalWeight) / (p.pace || 0.5)) * 7));
    onDone(
      { ...p, startWeight: p.weight, startDate: dkey(TODAY), targetDate: dkey(target) },
      { calories: plan.calories, carbs: plan.carbs, protein: plan.protein, fat: plan.fat,
        water: plan.water, bmr: plan.bmr, tdee: plan.tdee, sugar: 36, sodium: 2300, cholesterol: 300 }
    );
  }

  const inner = (
        <div className={"ob" + (bare ? " ob-bare" : "")}>
          {step > 0 && step < STEPS - 1 && (
            <button className="iconbtn" style={{ marginBottom: 16 }} onClick={back}>{I.back()}</button>
          )}

          {step < STEPS - 1 && (
            <div className="ob-prog">{Array.from({ length: STEPS - 1 }).map((_, i) => <i key={i} className={i <= step ? "on" : ""} />)}</div>
          )}

          {/* STEP 0 — goal */}
          {step === 0 && (
            <div className="pop">
              <div style={{ fontSize: 38 }}>🐱</div>
              <h1 style={{ fontSize: 28, marginTop: 8 }}>Welcome to Meow Track</h1>
              <p style={{ color: "var(--ink-soft)", fontWeight: 600, marginTop: 8, fontSize: 15 }}>What would you like to focus on?</p>
              <div className="stack" style={{ marginTop: 22 }}>
                {GOAL_OPTS.map((o) => (
                  <button key={o.k} className={"choice" + (p.goalType === o.k ? " on" : "")} onClick={() => set("goalType", o.k)}>
                    <span className="c-emoji">{o.emoji}</span>
                    <span><span className="c-t">{o.t}</span><span className="c-s">{o.s}</span></span>
                    <span className="c-check">{p.goalType === o.k && I.check()}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* STEP 1 — about you */}
          {step === 1 && (
            <div className="pop">
              <h1>A bit about you</h1>
              <p style={{ color: "var(--ink-soft)", fontWeight: 600, margin: "8px 0 20px", fontSize: 15 }}>So we can tailor your numbers.</p>
              <div className="field" style={{ marginBottom: 16 }}>
                <label>Your name</label>
                <input className="input" placeholder="e.g. Saihan" value={p.name} onChange={(e) => set("name", e.target.value)} />
              </div>
              <div className="field" style={{ marginBottom: 16 }}>
                <label>Sex</label>
                <div className="seg">
                  {["female", "male"].map((s) => <button key={s} className={p.sex === s ? "on" : ""} onClick={() => set("sex", s)}>{s[0].toUpperCase() + s.slice(1)}</button>)}
                </div>
              </div>
              <div className="field" style={{ marginBottom: 16 }}>
                <label>Units</label>
                <div className="seg">
                  {["metric", "imperial"].map((u) => <button key={u} className={units === u ? "on" : ""} onClick={() => setUnits(u)}>{u === "metric" ? "Metric (kg/cm)" : "Imperial (lb/ft)"}</button>)}
                </div>
              </div>
              <div className="form-grid">
                <div className="field"><label>Age</label><div className="input-wrap"><input className="input suffix-pad" type="number" placeholder="0" value={p.age || ""} onChange={(e) => set("age", +e.target.value || 0)} /><span className="suffix">yrs</span></div></div>
                <div className="field"><label>Height</label><div className="input-wrap"><input className="input suffix-pad" type="number" placeholder="0" value={p.height ? (units === "imperial" ? Math.round(p.height / 2.54) : p.height) : ""} onChange={(e) => set("height", units === "imperial" ? +e.target.value * 2.54 : +e.target.value || 0)} /><span className="suffix">{units === "imperial" ? "in" : "cm"}</span></div></div>
              </div>
              <div className="field" style={{ marginTop: 16 }}><label>Current weight</label><div className="input-wrap"><input className="input suffix-pad" type="number" step="0.1" placeholder="0" value={p.weight ? (units === "imperial" ? round1(kgToLb(p.weight)) : p.weight) : ""} onChange={(e) => set("weight", units === "imperial" ? lbToKg(+e.target.value) : +e.target.value || 0)} /><span className="suffix">{wUnit(units)}</span></div></div>
            </div>
          )}

          {/* STEP 2 — target */}
          {step === 2 && (
            <div className="pop">
              <h1>Set your target</h1>
              <p style={{ color: "var(--ink-soft)", fontWeight: 600, margin: "8px 0 20px", fontSize: 15 }}>BMI {bmi ? bmi.toFixed(1) : "—"} · <span style={{ color }}>{cat}</span></p>
              <div className="field" style={{ marginBottom: 18 }}><label>Goal weight</label><div className="input-wrap"><input className="input suffix-pad" type="number" step="0.1" placeholder="0" value={p.goalWeight ? (units === "imperial" ? round1(kgToLb(p.goalWeight)) : p.goalWeight) : ""} onChange={(e) => set("goalWeight", units === "imperial" ? lbToKg(+e.target.value) : +e.target.value || 0)} /><span className="suffix">{wUnit(units)}</span></div></div>
              <div className="field" style={{ marginBottom: 18 }}>
                <label>Activity level</label>
                <div className="stack" style={{ gap: 8 }}>
                  {ACT_OPTS.map((a) => (
                    <button key={a.f} className={"choice" + (p.activity === a.f ? " on" : "")} style={{ padding: 13 }} onClick={() => set("activity", a.f)}>
                      <span><span className="c-t" style={{ fontSize: 15 }}>{a.t}</span><span className="c-s">{a.s}</span></span>
                      <span className="c-check">{p.activity === a.f && I.check()}</span>
                    </button>
                  ))}
                </div>
              </div>
              {p.goalType !== "maintain" && (
                <div className="field">
                  <label>Weekly pace</label>
                  <div className="seg">
                    {[{ v: 0.25, n: "Relaxed" }, { v: 0.5, n: "Steady" }, { v: 0.75, n: "Ambitious" }].map((o) => (
                      <button key={o.v} className={p.pace === o.v ? "on" : ""} onClick={() => set("pace", o.v)}>{o.n}</button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* STEP 3 — building */}
          {step === 3 && <PlanBuilding onDone={next} />}

          {/* STEP 4 — plan ready */}
          {step === 4 && (
            <PlanReady p={p} plan={plan} bmi={bmi} cat={cat} color={color} units={units} onContinue={finish} />
          )}

          {step < 3 && (
            <div style={{ marginTop: "auto", paddingTop: 28 }}>
              <button className="btn btn-primary btn-block" disabled={(step === 1 && (!p.name.trim() || !(p.age > 0) || !(p.height > 0) || !(p.weight > 0))) || (step === 2 && !(p.goalWeight > 0))} onClick={next}>Continue</button>
            </div>
          )}
        </div>
  );

  if (bare) return inner;
  return (
    <div className="screen">
      <div className="island"></div>
      <div className="statusbar"><span className="time">9:41</span><StatusIcons ink="var(--ink)" /></div>
      <div className="view no-pad">
        {inner}
      </div>
    </div>
  );
}

function PlanBuilding({ onDone }) {
  const [i, setI] = useState(0);
  const steps = ["Crunching your numbers", "Balancing your macros", "Drawing your plan"];
  useEffect(() => {
    const t1 = setInterval(() => setI((x) => Math.min(steps.length - 1, x + 1)), 750);
    const t2 = setTimeout(onDone, 2500);
    return () => { clearInterval(t1); clearTimeout(t2); };
  }, []);
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flex: 1, gap: 20, padding: "60px 0" }}>
      <div style={{ fontSize: 46 }}>🐱</div>
      <div className="spin" style={{ width: 34, height: 34 }}></div>
      <div style={{ fontWeight: 800, fontSize: 18, textAlign: "center" }}>{steps[i]}…</div>
    </div>
  );
}

function PlanReady({ p, plan, bmi, cat, color, units, onContinue }) {
  const target = addDays(TODAY, Math.round((Math.abs(p.weight - p.goalWeight) / (p.pace || 0.5)) * 7));
  const months = Math.max(1, Math.round((target - TODAY) / (DAY_MS * 30)));
  const split = [
    { ...MACROS[0], g: plan.carbs, pct: MACRO_SPLITS.highprotein.carbs },
    { ...MACROS[1], g: plan.protein, pct: MACRO_SPLITS.highprotein.protein },
    { ...MACROS[2], g: plan.fat, pct: MACRO_SPLITS.highprotein.fat },

    <div className="pop" style={{ paddingBottom: 10 }}>

          <div className="between" style={{ marginTop: 4 }}>
            <div><div style={{ fontWeight: 800, fontSize: 14 }}>Today</div><div className="page-date">{shortDate(TODAY)}</div></div>
            <div style={{ textAlign: "right" }}><div style={{ fontWeight: 800, fontSize: 14 }}>Goal</div><div className="page-date">{shortDate(target)}</div></div>
          </div>
        </div>
      )}

      <div className="card flat pop pop-3" style={{ marginTop: 16, padding: 20 }}>
        <h3 style={{ fontSize: 19, marginBottom: 16 }}>Your daily calories goal</h3>
        <div style={{ display: "grid", placeItems: "center" }}>
          <Ring value={1} goal={1} size={176} stroke={15} color="var(--accent)" track="var(--accent)">
            <div className="big" style={{ fontSize: 38 }}>{fmt(plan.calories)}</div>
            <div className="unit">Calories</div>
          </Ring>
        </div>
        <div className="macro3" style={{ marginTop: 18 }}>
          {split.map((m) => (
            <div className="m" key={m.key}>
              <div className="mk" style={{ color: m.color }}>{m.label}</div>
              <div className="bar" style={{ width: "100%" }}><span style={{ width: "60%", background: m.color }}></span></div>

            </div>
          ))}
        </div>
      </div>

      <div className="card flat pop pop-4" style={{ marginTop: 16, padding: 20 }}>
        <h3 style={{ fontSize: 19, marginBottom: 6 }}>Baseline at goal setup</h3>
        <div className="baserow">
          <div><div className="bk">Body mass index</div><div className="bv">BMI: {bmi.toFixed(1)} <span className="pill warn" style={{ marginLeft: 4 }}>{cat}</span></div></div>
        </div>
        <div className="baserow"><div><div className="bk">Basal metabolic rate</div><div className="bv">BMR: {fmt(plan.bmr)} kcal</div></div></div>
        <div className="baserow"><div><div className="bk">Total daily energy</div><div className="bv">TDEE: {fmt(plan.tdee)} kcal</div></div></div>
      </div>

      <button className="btn btn-primary btn-block" style={{ marginTop: 22 }} onClick={onContinue}>Continue</button>
    </div>
  );
}

function WeekDots({ logged }) {

  return (
    <div className="row" style={{ gap: 0, justifyContent: "space-between", marginTop: 16 }}>
      {days.map((d, i) => {
        const isToday = dkey(d) === dkey(TODAY);
        const isLogged = logged.includes(dkey(d));
        const future = d > TODAY;
        return (
          <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
            <div style={{ width: 38, height: 38, borderRadius: 999, display: "grid", placeItems: "center", fontWeight: 800, fontSize: 14,

              {DOW[d.getDay()]}

function FlatWeightChart({ weightLog, profile, units }) {
  const days = weekDays(TODAY);
  const goalKg = profile.goalWeight;
  const startKg = profile.startWeight || profile.weight;
  const lo = Math.min(goalKg, startKg) - 8, hi = Math.max(goalKg, startKg) + 2;
  const W = 330, H = 130, padR = 26, padB = 20, padT = 10;
  const y = (kg) => padT + (1 - (kg - lo) / (hi - lo)) * (H - padT - padB);
  const x = (i) => 6 + (i / 6) * (W - 6 - padR);
  const pts = days.map((d) => {
    const e = weightLog.filter((w) => w.date <= dkey(d)).slice(-1)[0];
    return e ? e.kg : null;
  });
  const ticks = [hi - 1, (hi + lo) / 2, lo + 1];
  return (
    <div className="chart">
      <svg viewBox={`0 0 ${W} ${H}`}>
        {ticks.map((t, i) => <g key={i}><line className="gridline" x1="6" y1={y(t)} x2={W - padR} y2={y(t)} /><text className="axis-lab" x={W - padR + 3} y={y(t) + 4}>{round(units === "imperial" ? kgToLb(t) : t)}</text></g>)}
        <line x1="6" y1={y(goalKg)} x2={W - padR} y2={y(goalKg)} stroke="var(--accent)" strokeWidth="2.5" strokeDasharray="7 6" strokeLinecap="round" />
        {pts.some((p) => p != null) && (
          <polyline fill="none" stroke="var(--ink)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
            points={pts.map((p, i) => p != null ? `${x(i)},${y(p)}` : null).filter(Boolean).join(" ")} />
        )}
        {pts.map((p, i) => p != null && <circle key={i} cx={x(i)} cy={y(p)} r="3.5" fill="var(--ink)" />)}
        {days.map((d, i) => <text key={i} className="axis-lab" x={x(i)} y={H - 4} textAnchor="middle">{DOW[d.getDay()]}</text>)}
      </svg>
    </div>
  );
}
