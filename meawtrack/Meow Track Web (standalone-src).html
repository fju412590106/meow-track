/* ---------------- Food confirm (shared) ---------------- */
function FoodConfirm({ food, onConfirm, showToast, defaultMeal }) {
  const [meal, setMeal] = useState(defaultMeal || guessMeal());
  const [qty, setQty] = useState(1);
  const [analysis, setAnalysis] = useState(null);
  const [aLoading, setALoading] = useState(false);
  const [showHealth, setShowHealth] = useState(false);
  const [name, setName] = useState(food.name);
  const [ingredients, setIngredients] = useState(() => (food.ingredients && food.ingredients.length ? [...food.ingredients] : []));
  const [newIng, setNewIng] = useState("");
  const scaled = (n) => round1((n || 0) * qty);

  async function loadAnalysis() {
    if (analysis || aLoading) { setShowHealth((s) => !s); return; }
    setShowHealth(true); setALoading(true);
    try {
      const r = await aiHealthAnalysis({ ...food, name, sugar: scaled(food.sugar), sodium: scaled(food.sodium), chol: scaled(food.chol), cal: scaled(food.cal) });
      setAnalysis(r || { summary: "Couldn't analyze right now.", sugar: "", sodium: "", cholesterol: "", swap: "" });
    } catch { setAnalysis({ summary: "Couldn't reach AI. Try again.", sugar: "", sodium: "", cholesterol: "", swap: "" }); }
    setALoading(false);
  }

  function editIng(i, v) { setIngredients((s) => s.map((x, idx) => idx === i ? v : x)); }
  function removeIng(i) { setIngredients((s) => s.filter((_, idx) => idx !== i)); }
  function addIng() { const v = newIng.trim(); if (!v) return; setIngredients((s) => [...s, v]); setNewIng(""); }

  function add() {
    onConfirm({
      id: Date.now() + Math.random(), name: name.trim() || food.name, emoji: food.emoji || "🍽️",
      serving: qty === 1 ? food.serving : `${qty} × ${food.serving}`, meal,
      cal: scaled(food.cal), carbs: scaled(food.carbs), protein: scaled(food.protein), fat: scaled(food.fat),
      sugar: scaled(food.sugar), sodium: scaled(food.sodium), chol: scaled(food.chol),
      ingredients: ingredients.filter((x) => x.trim()),
      photo: food.photo || null, analysis,
    });
    showToast(`Added to ${meal}`);
  }

  const hasIng = food.ingredients !== undefined; // AI/scan/barcode flows attach this (even if empty)
  const lv = nutrientLevels({ sugar: scaled(food.sugar), sodium: scaled(food.sodium), chol: scaled(food.chol) });
  return (
    <div className="stack pop">
      <div className="card flat" style={{ padding: 18 }}>
        <div className="row" style={{ gap: 14 }}>
          {food.photo ? <img src={food.photo} className="thumb" style={{ width: 64, height: 64 }} /> : <div className="thumb" style={{ width: 64, height: 64, fontSize: 32 }}>{food.emoji || "🍽️"}</div>}
          <div style={{ flex: 1, minWidth: 0 }}>
            <input className="name-edit" value={name} onChange={(e) => setName(e.target.value)} aria-label="Food name" />
            <div style={{ fontSize: 14, fontWeight: 700, color: "var(--ink-soft)", marginTop: 3 }}>{scaled(food.cal)} kcal · {food.serving}</div>
          </div>
        </div>
        <div className="macro3" style={{ marginTop: 16 }}>
          {[["🍞", scaled(food.carbs), "Carbs"], ["🥩", scaled(food.protein), "Protein"], ["🧀", scaled(food.fat), "Fat"]].map(([e, v, k]) => (
            <div className="m" key={k}><div className="emoji">{e}</div><div className="mk">{v} g</div><div className="mv">{k}</div></div>
          ))}
        </div>
      </div>

      {/* Editable ingredients (scan / barcode / AI search) */}
      {hasIng && (
        <div className="card flat" style={{ padding: 16 }}>
          <div className="between" style={{ marginBottom: 12 }}>
            <div className="row" style={{ gap: 8 }}>{I.fork({ width: 17, height: 17, style: { color: "var(--accent)" } })}<span style={{ fontWeight: 800, fontSize: 15 }}>Ingredients</span></div>
            <span className="pill" style={{ background: "var(--well)", color: "var(--ink-soft)", fontSize: 11.5 }}>{ingredients.length}</span>
          </div>
          <div className="ing-list">
            {ingredients.map((ing, i) => (
              <div className="ing-row" key={i}>
                <span className="ing-dot"></span>
                <input className="ing-input" value={ing} onChange={(e) => editIng(i, e.target.value)} placeholder="Ingredient" />
                <button className="ing-x" onClick={() => removeIng(i)} aria-label="Remove">{I.x({ width: 14, height: 14 })}</button>
              </div>
            ))}
            {!ingredients.length && <div style={{ fontSize: 13, fontWeight: 600, color: "var(--muted)", padding: "4px 2px 10px" }}>No ingredients detected — add them below.</div>}
          </div>
          <div className="ing-add">
            <input className="ing-input" value={newIng} onChange={(e) => setNewIng(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addIng(); }} placeholder="Add an ingredient…" />
            <button className="btn btn-sm btn-ghost" onClick={addIng} disabled={!newIng.trim()}>{I.plus({ width: 16, height: 16 })} Add</button>
          </div>
        </div>
      )}

      <div className="field"><label>Meal</label>
        <div className="seg">{MEAL_TYPES.map((m) => <button key={m} className={meal === m ? "on" : ""} onClick={() => setMeal(m)}>{m}</button>)}</div>
      </div>

      <div className="between">
        <label style={{ fontSize: 13.5, fontWeight: 800, color: "var(--ink-soft)" }}>Servings</label>
        <div className="row" style={{ gap: 12 }}>
          <button className="iconbtn ghost" onClick={() => setQty((q) => Math.max(0.5, round1(q - 0.5)))}>−</button>
          <span style={{ fontWeight: 800, fontSize: 18, minWidth: 36, textAlign: "center" }}>{qty}</span>
          <button className="iconbtn ghost" onClick={() => setQty((q) => round1(q + 0.5))}>{I.plus()}</button>
        </div>
      </div>

      {/* AI health analysis */}
      <button className="health-card" style={{ width: "100%", textAlign: "left" }} onClick={loadAnalysis}>
        <div className="health-h"><span style={{ flex: 1, display: "flex", gap: 9, alignItems: "center" }}>{I.sparkle()} AI health analysis</span>
          <span style={{ display: "flex", gap: 5 }}>
            <FlagDot level={lv.sugar} />{<FlagDot level={lv.sodium} />}{<FlagDot level={lv.chol} />}
          </span>
          <span style={{ transform: showHealth ? "rotate(180deg)" : "", transition: "transform .2s", marginLeft: 8, color: "var(--muted)" }}>{I.chevD({ width: 16, height: 16 })}</span>
        </div>
        {showHealth && (
          <div className="health-body">
            {aLoading && <div className="analyzing" style={{ padding: 8 }}><div className="spin"></div> Analyzing sugar, sodium &amp; cholesterol…</div>}
            {!aLoading && analysis && (
              <>
                {analysis.summary && <p style={{ fontWeight: 700, fontSize: 14, lineHeight: 1.5, marginBottom: 12 }}>{analysis.summary}</p>}
                <NutriRow k="Sugar" v={`${scaled(food.sugar)} g`} pct={clampPct(scaled(food.sugar), 36)} level={lv.sugar} note={analysis.sugar} />
                <NutriRow k="Sodium" v={`${scaled(food.sodium)} mg`} pct={clampPct(scaled(food.sodium), 2300)} level={lv.sodium} note={analysis.sodium} />
                <NutriRow k="Cholesterol" v={`${scaled(food.chol)} mg`} pct={clampPct(scaled(food.chol), 300)} level={lv.chol} note={analysis.cholesterol} />
                {analysis.swap && <div className="banner hot" style={{ marginTop: 12 }}>{I.bolt()}<span><b>Tip ·</b> {analysis.swap}</span></div>}
              </>
            )}
          </div>
        )}
      </button>

      <button className="btn btn-primary btn-block" onClick={add}>{I.check()} Add to diary</button>
    </div>
  );
}

const LEVEL_COLOR = { low: "var(--carbs)", ok: "var(--yellow-d)", high: "var(--accent)" };
function FlagDot({ level }) { return <span style={{ width: 9, height: 9, borderRadius: 999, background: LEVEL_COLOR[level] || "var(--muted)" }}></span>; }
function NutriRow({ k, v, pct, level, note }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div className="nutri-row" style={{ padding: "2px 0" }}>
        <span className="nk">{k}</span>
        <span className="nbar"><span style={{ width: pct + "%", background: LEVEL_COLOR[level] }}></span></span>
        <span className="nv">{v}</span>
      </div>
      {note && <div style={{ fontSize: 12.5, fontWeight: 600, color: "var(--muted)", paddingLeft: 0, marginTop: 2 }}>{note}</div>}

}
function guessMeal() { const h = new Date().getHours(); return h < 11 ? "Breakfast" : h < 16 ? "Lunch" : h < 21 ? "Dinner" : "Snack"; }

/* ---------------- Scan Meal ---------------- */
function ScanMeal({ onConfirm, showToast, defaultMeal }) {
  const [photo, setPhoto] = useState(null);
  const [busy, setBusy] = useState(false);
  const [food, setFood] = useState(null);
  const [err, setErr] = useState(null);
  const [over, setOver] = useState(false);
  const fileRef = useRef();

  async function handle(file) {
    if (!file || !file.type.startsWith("image/")) return;
    setErr(null);
    const raw = await fileToDataURL(file); const small = await downscale(raw);
    setPhoto(small); setBusy(true);
    try {
      const r = await aiEstimateFood(null, small);
      if (r) setFood({ ...r, photo: small }); else setErr("Couldn't read that photo. Try another.");
    } catch { setErr("AI is unavailable right now."); }
    setBusy(false);
  }

  if (food) return <FoodConfirm food={food} onConfirm={onConfirm} showToast={showToast} defaultMeal={defaultMeal} />;
  return (
    <div className="stack pop">
      {!photo && (
        <div className={"drop" + (over ? " over" : "")} onClick={() => fileRef.current.click()}
          onDragOver={(e) => { e.preventDefault(); setOver(true); }} onDragLeave={() => setOver(false)}
          onDrop={(e) => { e.preventDefault(); setOver(false); handle(e.dataTransfer.files[0]); }}>
          <div className="ico">{I.camera()}</div>
          <h4>Snap or upload your meal</h4>
          <p>AI estimates calories, macros &amp; nutrients</p>
        </div>
      )}
      {photo && <div className="preview"><img src={photo} /><button className="x" onClick={() => { setPhoto(null); setFood(null); setErr(null); }}>{I.x()}</button></div>}
      {busy && <div className="analyzing"><div className="spin"></div> Looking at your plate…</div>}
      {err && <div className="banner warn">{I.info()}{err}</div>}
      <input ref={fileRef} type="file" accept="image/*" hidden onChange={(e) => handle(e.target.files[0])} />
      {!photo && <div className="banner info">{I.sparkle({ style: { color: "#2C7BB0" } })}Works best with a clear, well-lit photo of the full plate.</div>}
    </div>
  );
}

/* ---------------- Barcode Scan ---------------- */
function BarcodeScan({ onConfirm, showToast, defaultMeal }) {
  const [scanning, setScanning] = useState(true);
  const [found, setFound] = useState(null);
  useEffect(() => {
    if (!scanning) return;
    const t = setTimeout(() => { setFound(BARCODE_DB[Math.floor(Math.random() * BARCODE_DB.length)]); setScanning(false); }, 2200);
    return () => clearTimeout(t);
  }, [scanning]);

  if (found) return (
    <div className="stack pop">
      <div className="banner good">{I.check()}Barcode {found.code} matched</div>
      <FoodConfirm food={found} onConfirm={onConfirm} showToast={showToast} defaultMeal={defaultMeal} />

  );
  return (
    <div className="stack pop" style={{ alignItems: "center", paddingTop: 30 }}>
      <div style={{ width: "100%", height: 220, borderRadius: 20, background: "var(--ink)", position: "relative", overflow: "hidden", display: "grid", placeItems: "center" }}>

/* ---------------- AI Search ---------------- */
function AISearch({ onConfirm, showToast, defaultMeal }) {
  const [q, setQ] = useState("");

  const [food, setFood] = useState(null);
  const [err, setErr] = useState(null);
  const examples = ["a bowl of pho with brisket", "venti caramel macchiato", "2 slices pepperoni pizza", "chicken katsu curry"];

  async function go() {
    if (!q.trim()) return; setBusy(true); setErr(null);
    try { const r = await aiEstimateFood(q.trim()); if (r) setFood(r); else setErr("Couldn't estimate that. Rephrase?"); }
    catch { setErr("AI is unavailable right now."); }
    setBusy(false);
  }
  if (food) return <FoodConfirm food={food} onConfirm={onConfirm} showToast={showToast} defaultMeal={defaultMeal} />;
  return (
    <div className="stack pop">

  async function estimate() {
    if (!customName.trim()) return;

/* ===== meow_insight.jsx ===== */
/* insight.jsx — charts + AI nutrient roundup, with flexible periods */

const PERIODS = [
  { k: "thisweek", label: "This week" },
  { k: "lastweek", label: "Last week" },
  { k: "thismonth", label: "This month" },
  { k: "lastmonth", label: "Last month" },
  { k: "thisyear", label: "This year" },
];
const MONTHS_SHORT = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

/* Build aggregated buckets for a period. Bars show averaged-per-logged-day intake
   so the daily goal line stays a meaningful reference across week/month/year. */
function buildPeriod(key, mealsByDay, waterByDay, activityByDay, dailySynced) {
  const T = TODAY;
  let buckets = [], rangeLabel = "";

  if (key === "thisweek" || key === "lastweek") {
    const wd = weekDays(key === "lastweek" ? addDays(T, -7) : T);
    buckets = wd.map((d) => ({ text: DOW[d.getDay()], show: true, days: [d] }));
    rangeLabel = shortDate(wd[0]) + " – " + shortDate(wd[6]);
  } else if (key === "thismonth" || key === "lastmonth") {
    const base = new Date(T.getFullYear(), T.getMonth() + (key === "lastmonth" ? -1 : 0), 1);
    const y = base.getFullYear(), m = base.getMonth(), n = new Date(y, m + 1, 0).getDate();
    buckets = Array.from({ length: n }, (_, i) => ({ text: String(i + 1), show: i === 0 || (i + 1) % 5 === 0, days: [new Date(y, m, i + 1)] }));
    rangeLabel = base.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
  } else {
    const y = T.getFullYear();
    buckets = Array.from({ length: 12 }, (_, m) => {
      const dim = new Date(y, m + 1, 0).getDate();
      return { text: MONTHS_SHORT[m][0], show: true, days: Array.from({ length: dim }, (_, d) => new Date(y, m, d + 1)) };
    });
    rangeLabel = "Year " + y;
  }

  const labels = [], intake = [], burned = [], water = [];
  const sums = { cal: 0, sugar: 0, sodium: 0, chol: 0 };
  let loggedDays = 0;

  for (const b of buckets) {
    const t = { cal: 0, carbs: 0, protein: 0, fat: 0 };
    let logged = 0, burn = 0, wat = 0, watDays = 0;
    for (const d of b.days) {
      const k = dkey(d);
      const ms = mealsByDay[k] || [];
      if (ms.length) {
        const s = sumMeals(ms);
        t.cal += s.cal; t.carbs += s.carbs; t.protein += s.protein; t.fat += s.fat;
        logged++; loggedDays++;
        sums.cal += s.cal; sums.sugar += s.sugar; sums.sodium += s.sodium; sums.chol += s.chol;
      }
      burn += (activityByDay[k] || []).reduce((a, x) => a + (x.kcal || 0), 0) + (dailySynced || 0);
      const w = waterByDay[k] || 0; wat += w; if (w) watDays++;
    }
    const div = Math.max(1, logged);
    labels.push({ text: b.text, show: b.show });
    intake.push({ cal: t.cal / div, carbs: t.carbs / div, protein: t.protein / div, fat: t.fat / div });
    burned.push(b.days.length ? burn / b.days.length : 0);
    water.push(watDays ? wat / watDays : 0);
  }
  return { rangeLabel, labels, intake, burned, water, sums, loggedDays };
}

function Insight({ mealsByDay, goals, profile, weightLog, waterByDay, activityByDay, units, health }) {
  const [period, setPeriod] = useState("thisweek");
  const P = buildPeriod(period, mealsByDay, waterByDay, activityByDay, syncedActivity(health).kcal);
  const periodLabel = PERIODS.find((p) => p.k === period).label;
  const avgCal = P.loggedDays ? round(P.sums.cal / P.loggedDays) : 0;
  const hasBurned = P.burned.some((b) => b > 0);
  const hasWater = P.water.some((w) => w > 0);

  const curWeight = weightLog.length ? weightLog[weightLog.length - 1].kg : profile.weight;
  const startW = profile.startWeight || profile.weight;
  const progress = startW !== profile.goalWeight ? clampPct(startW - curWeight, startW - profile.goalWeight) : 0;
  const { bmi, cat } = bmiInfo(curWeight, profile.height);

  return (
    <>
      <div className="page-head pop"><div className="page-title">Insight</div></div>

      <PeriodTabs value={period} onChange={setPeriod} />
      <div className="period-range pop">{P.rangeLabel}</div>

      {/* calories intake */}
      <div className="card pop pop-2" style={{ marginTop: 14 }}>
        <div className="card-h"><h3>Calories intake</h3><button className="iconbtn ghost">{I.upload({ width: 17, height: 17 })}</button></div>
        <div className="row" style={{ gap: 6, alignItems: "baseline" }}><span style={{ fontSize: 34, fontWeight: 800 }}>{fmt(avgCal)}</span><span style={{ fontSize: 15, fontWeight: 700, color: "var(--ink-soft)" }}>Daily avg kcal · {P.loggedDays} day{P.loggedDays === 1 ? "" : "s"} logged</span></div>
        <div className="legend" style={{ margin: "14px 0 6px" }}>
          {MACROS.map((m) => <span className="lg" key={m.key}><span className="sw" style={{ background: m.color }}></span>{m.label}</span>)}
        </div>
        {P.loggedDays ? <StackedBars labels={P.labels} intake={P.intake} goal={goals.calories} />
          : <div className="empty"><div className="e-emoji">🍽️</div><p>No meals logged in this period yet.</p></div>}
      </div>

      {/* calories burned */}
      <div className="card pop pop-2" style={{ marginTop: 18 }}>
        <div className="card-h"><h3>Calories burned</h3><button className="iconbtn ghost">{I.upload({ width: 17, height: 17 })}</button></div>
        {hasBurned ? <SimpleBars labels={P.labels} values={P.burned.map(round)} color="var(--teal)" />
          : <div className="empty"><div className="e-emoji">💪</div><p>Log an activity to see calories burned here.</p></div>}
      </div>

function StackedBars({ labels, intake, goal }) {
  const W = 340, H = 170, padB = 22, padT = 6, padR = 34, padL = 6;
  const n = intake.length || 1;
  const max = Math.max(goal || 0, ...intake.map((d) => d.cal), 1);
  const slot = (W - padL - padR) / n;
  const bw = Math.max(3, Math.min(20, slot * 0.62));
  const y = (v) => padT + (1 - v / max) * (H - padT - padB);
  const x = (i) => padL + (i + 0.5) * slot;
  const grids = [0, 0.25, 0.5, 0.75, 1].map((f) => round(max * f));
  return (
    <div className="chart">
      <svg viewBox={`0 0 ${W} ${H}`}>
        {grids.map((g, i) => <g key={i}><line className="gridline" x1={padL} y1={y(g)} x2={W - padR} y2={y(g)} /><text className="axis-lab" x={W - padR + 3} y={y(g) + 4}>{g}</text></g>)}
        {goal > 0 && <line x1={padL} y1={y(goal)} x2={W - padR} y2={y(goal)} stroke="var(--accent)" strokeWidth="2" strokeDasharray="6 5" />}
        {intake.map((t, i) => {
          const segs = [[t.carbs * 4, "var(--carbs)"], [t.protein * 4, "var(--protein)"], [t.fat * 9, "var(--fat)"]];
          let acc = 0;
          return (
            <g key={i}>
              {t.cal > 0 && segs.map(([val, c], si) => { const y0 = y(acc); acc += val; const y1 = y(acc); return <rect key={si} x={x(i) - bw / 2} y={y1} width={bw} height={Math.max(0, y0 - y1)} fill={c} rx={si === 2 ? Math.min(4, bw / 2) : 0} />; })}
              {labels[i] && labels[i].show && <text className="axis-lab" x={x(i)} y={H - 5} textAnchor="middle">{labels[i].text}</text>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function SimpleBars({ labels, values, color, goal }) {
  const W = 340, H = 150, padB = 22, padT = 6, padR = 8, padL = 6;
  const n = values.length || 1;
  const max = Math.max(goal || 0, ...values, 1);
  const slot = (W - padL - padR) / n;
  const bw = Math.max(3, Math.min(22, slot * 0.62));
  const y = (v) => padT + (1 - v / max) * (H - padT - padB);
  const x = (i) => padL + (i + 0.5) * slot;
  return (
    <div className="chart">
      <svg viewBox={`0 0 ${W} ${H}`}>
        {goal > 0 && <line x1={padL} y1={y(goal)} x2={W - padR} y2={y(goal)} stroke="var(--accent)" strokeWidth="2" strokeDasharray="6 5" />}
        {values.map((v, i) => (
          <g key={i}>
            {v > 0 && <rect x={x(i) - bw / 2} y={y(v)} width={bw} height={H - padB - y(v)} fill={color} rx={Math.min(5, bw / 2)} />}
            {labels[i] && labels[i].show && <text className="axis-lab" x={x(i)} y={H - 5} textAnchor="middle">{labels[i].text}</text>}
          </g>
        ))}
      </svg>
    </div>
  );
}

function BmiGauge({ bmi }) {
  const pos = Math.max(0, Math.min(100, (bmi - 14) / (40 - 14) * 100));
  return (
    <div style={{ position: "relative", height: 16 }}>
      <div style={{ height: 10, borderRadius: 999, background: "linear-gradient(90deg, var(--water), var(--carbs) 35%, var(--yellow) 60%, var(--accent) 85%, #D6402A)" }}></div>
      <div style={{ position: "absolute", top: -3, left: `calc(${pos}% - 8px)`, width: 16, height: 16, borderRadius: 999, background: "#fff", border: "3px solid var(--ink)", boxShadow: "var(--shadow-sm)" }}></div>
    </div>
  );
}

function WeeklyRoundup({ totals, loggedDays, periodLabel }) {
  const [data, setData] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);
  const lbl = (periodLabel || "this period").toLowerCase();

  async function gen() {
    if (loggedDays === 0) return;
    setBusy(true); setErr(null);
    try { const r = await aiWeeklyRoundup(totals, loggedDays); if (r) setData(r); else setErr("Couldn't generate. Try again."); }
    catch { setErr("AI unavailable right now."); }
    setBusy(false);
  }
  useEffect(() => { setData(null); setErr(null); }, [loggedDays, totals.cal]);

  const LEVEL = { low: ["var(--carbs)", "Low"], ok: ["var(--yellow-d)", "On track"], high: ["var(--accent)", "High"] };
  return (
    <div className="card pop pop-3" style={{ marginTop: 18, background: "linear-gradient(135deg, var(--accent-wash), var(--yellow-wash))" }}>
      <div className="card-h"><h3 style={{ display: "flex", gap: 9, alignItems: "center" }}>{I.sparkle({ style: { color: "var(--accent)" } })} Nutrient roundup</h3></div>
      {!data && !busy && (
        <>
          <p style={{ fontSize: 14.5, fontWeight: 700, color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: 14 }}>Let AI review your sugar, sodium &amp; cholesterol for {lbl} and suggest where to focus.</p>
          {err && <div className="banner warn" style={{ marginBottom: 12 }}>{I.info()}{err}</div>}
          <button className="btn btn-primary btn-block" onClick={gen} disabled={loggedDays === 0}>{I.sparkle()} {loggedDays === 0 ? "Log meals to analyze" : "Analyze " + lbl}</button>
        </>
      )}
      {busy && <div className="analyzing"><div className="spin"></div> Reviewing your nutrition…</div>}
      {data && (
        <div className="pop">
          <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 14 }}>{data.headline}</div>
          {[["Sugar", data.sugar, "g", round(totals.sugar / loggedDays)], ["Sodium", data.sodium, "mg", round(totals.sodium / loggedDays)], ["Cholesterol", data.cholesterol, "mg", round(totals.chol / loggedDays)]].map(([k, o, u, avg]) => (
            <div key={k} className="card flat" style={{ padding: 13, marginBottom: 10, background: "var(--surface)" }}>
              <div className="between" style={{ marginBottom: 4 }}>
                <span style={{ fontWeight: 800, fontSize: 14.5 }}>{k}</span>
                <span className="pill" style={{ background: (LEVEL[o?.level]?.[0] || "var(--muted)") + "22", color: LEVEL[o?.level]?.[0] || "var(--muted)", fontSize: 11.5 }}>{LEVEL[o?.level]?.[1] || "—"} · {avg} {u}/day</span>
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--ink-soft)", lineHeight: 1.45 }}>{o?.note}</div>
            </div>
          ))}
          {data.focus && <div className="banner hot" style={{ marginTop: 4 }}>{I.bolt()}<span><b>Up next ·</b> {data.focus}</span></div>}
        </div>
      )}
    </div>
  );
}

async function aiChat(history, profile, goals) {
  const sys = "You are Meow, the friendly in-app AI assistant for Meow Track, a calorie & nutrition tracking app. " +
    "You help with nutrition, healthy eating, meal ideas, calories & macros, weight goals, workouts and motivation. " +
    "Be warm, encouraging and practical. Use plain, everyday language and give specific, actionable advice with realistic numbers. " +
    "Keep replies short — 2 to 4 sentences, or a tight bullet list. An occasional light cat touch (a 🐾 now and then) is welcome but don't overdo it. " +
    "You are not a doctor: for medical concerns, gently suggest seeing a professional and mention that Meow Track can connect them with verified dietitians, health coaches and trainers in 'Meow Track for Professional'. " +
    "Reply in plain conversational text only — no markdown, asterisks, bold, or headings.";
  const ctx = profile ? `\n\n[User context] name: ${profile.name}; ${profile.sex}, age ${profile.age}; current weight ${round1(profile.weight)} kg; goal weight ${round1(profile.goalWeight)} kg (${profile.goalType}); daily target ${goals && goals.calories ? goals.calories + " kcal" : "not set"}, protein ${goals ? goals.protein : "?"} g.` : "";
  const convo = history.map((m) => (m.role === "user" ? "User: " : "Meow: ") + m.text).join("\n");
  const prompt = sys + ctx + "\n\nConversation so far:\n" + convo + "\n\nWrite Meow's next reply only (no 'Meow:' prefix):";
  const reply = await window.claude.complete(prompt);
  return (reply || "").trim().replace(/\*\*/g, "").replace(/^#{1,6}\s+/gm, "");
}

function MeowChat({ open, onClose, seed, profile, goals }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const bodyRef = useRef();
  const taRef = useRef();

  useEffect(() => { if (open && seed) { setInput(seed); setTimeout(() => taRef.current && taRef.current.focus(), 320); } }, [open, seed]);
  useEffect(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, [msgs, busy]);

  async function send(text) {
    const t = (text != null ? text : input).trim();
    if (!t || busy) return;
    const next = [...msgs, { role: "user", text: t }];
    setMsgs(next); setInput(""); setBusy(true);
    try {
      const reply = await aiChat(next, profile, goals);
      setMsgs((m) => [...m, { role: "ai", text: reply || "Hmm, I couldn't think of an answer just then — try asking again? 🐾" }]);
    } catch {
      setMsgs((m) => [...m, { role: "ai", text: "I'm having trouble connecting right now. Please try again in a moment." }]);
    }
    setBusy(false);
  }

  return (
    <div className={"chat-overlay" + (open ? " show" : "")}>
      <div className="chat-head">
        <button className="iconbtn" onClick={onClose}>{I.back()}</button>
        <div className="chat-id">
          <div className="chat-av">🐱</div>
          <div><div className="cn">Meow AI</div><div className="cs">{busy ? "typing…" : "Nutrition & fitness assistant"}</div></div>
        </div>
        <button className="iconbtn" title="Clear chat" onClick={() => setMsgs([])}>{I.history()}</button>
      </div>

      <div className="chat-body" ref={bodyRef}>
        {msgs.length === 0 && (
          <div className="chat-welcome pop">
            <div className="cw-av">🐱</div>
            <h3>Hi {profile && profile.name ? profile.name : "there"}! I'm Meow 🐾</h3>
            <p>Ask me anything about your nutrition, meals, weight goal, or workouts.</p>
            <div className="chat-suggest">{CHAT_SUGGESTIONS.map((s) => <button key={s} onClick={() => send(s)}>{s}</button>)}</div>
          </div>
        )}
        {msgs.map((m, i) => (
          <div key={i} className={"msg " + m.role}>
            {m.role === "ai" && <div className="msg-av">🐱</div>}
            <div className="bubble">{m.text}</div>
          </div>
        ))}
        {busy && <div className="msg ai"><div className="msg-av">🐱</div><div className="bubble typing"><span></span><span></span><span></span></div></div>}
      </div>

      <div className="chat-input-bar">
        <textarea ref={taRef} className="chat-input" rows={1} placeholder="Message Meow AI…" value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} />
        <button className="chat-send" onClick={() => send()} disabled={busy || !input.trim()}><SendIcon /></button>
      </div>
    </div>
  );
}

const PROV = Object.fromEntries(HEALTH_PROVIDERS.map((p) => [p.k, p]));

/* Aggregate today's synced activity. Uses the strongest single source for the
   calorie budget so connecting several devices doesn't double-count. */
function syncedActivity(health) {
  const on = HEALTH_PROVIDERS.filter((p) => health && health[p.k]);
  const kcal = on.length ? Math.max(...on.map((p) => p.kcal)) : 0;
  const steps = on.length ? Math.max(...on.map((p) => p.steps || 0)) : 0;
  return { kcal, steps, items: on };
}
const anyConnected = (health) => HEALTH_PROVIDERS.some((p) => health && health[p.k]);

function agoLabel(ts) {
  if (!ts) return "";
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 45) return "just now";
  const m = Math.floor(s / 60); if (m < 60) return m + " min ago";
  const h = Math.floor(m / 60); if (h < 24) return h + " h ago";
  return Math.floor(h / 24) + " d ago";
}

function ProvTile({ p, size = 46 }) {
  return (
    <div className="prov-tile" style={{ width: size, height: size, background: p.bg, color: p.fg, border: p.bordered ? "1px solid var(--line-2)" : "none" }}>
      {p.glyph(Math.round(size * 0.5))}
    </div>
  );
}

/* ---------- Connect (OAuth-style permission) flow ---------- */
function ConnectFlow({ provider, onAllow, onCancel }) {
  const p = provider;
  const [phase, setPhase] = useState("ask"); // ask | auth
  function allow() {
    setPhase("auth");
    setTimeout(() => onAllow(), 1500);
  }
  return (
    <div className="connect-screen pop">
      <div className="connect-card">
        <div className="connect-brand">
          <ProvTile p={p} size={64} />
          <div className="connect-link">{I.link({ width: 16, height: 16 })}</div>

        </div>
        {phase === "ask" ? (
          <>
            <h3 style={{ textAlign: "center", fontSize: 20, marginTop: 4 }}>Connect {p.name}</h3>
            <p style={{ textAlign: "center", fontSize: 14, fontWeight: 600, color: "var(--ink-soft)", margin: "8px 0 18px", lineHeight: 1.5 }}>“{p.name}” will share this data with Meow&nbsp;Track:</p>

            </div>
            <button className="btn btn-primary btn-block" style={{ marginTop: 18 }} onClick={allow}>{I.shield({ width: 18, height: 18 })} Allow access</button>
            <button className="btn btn-ghost btn-block" style={{ marginTop: 10 }} onClick={onCancel}>Cancel</button>
            <div className="connect-note">{I.info({ width: 14, height: 14 })}<span>{p.note}</span></div>

            <div style={{ fontWeight: 800, fontSize: 16 }}>Connecting to {p.name}…</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--muted)", marginTop: 6 }}>Authorising &amp; pulling your latest activity</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------- Integrations hub ---------- */
function Integrations({ health, setHealth, showToast }) {
  const [connecting, setConnecting] = useState(null);

  function disconnect(k) { setHealth((h) => { const n = { ...h }; delete n[k]; return n; }); showToast(PROV[k].name + " disconnected"); }
  function onAllow(k) { setHealth((h) => ({ ...h, [k]: Date.now() })); setConnecting(null); showToast(PROV[k].name + " connected ✓"); }

  if (connecting) return <ConnectFlow provider={PROV[connecting]} onAllow={() => onAllow(connecting)} onCancel={() => setConnecting(null)} />;

  return (
    <div className="stack">
      <div className="banner info">{I.link({ style: { color: "#2C7BB0" } })}Connect a device or app to sync activity automatically. Calories burned flow into your daily budget.</div>

}

/* ---------- Activity logging (live synced view + manual) ---------- */
function ActivityLogging({ health, setHealth, showToast }) {
  const [syncing, setSyncing] = useState(false);
  const synced = syncedActivity(health);
  const connected = synced.items;

  function syncNow() {
    if (!connected.length) return;
    setSyncing(true);
    setTimeout(() => {
      setHealth((h) => { const n = { ...h }; connected.forEach((p) => { n[p.k] = Date.now(); }); return n; });

      <div className="between" style={{ marginBottom: 18, gap: 16, flexWrap: "wrap" }}>
        <PeriodTabs value={period} onChange={setPeriod} />
        <span className="period-range" style={{ margin: 0 }}>{P.rangeLabel}</span>
      </div>
      <div className="web-2">
        <div className="card pop span2">
          <div className="card-h"><h3>Calories intake</h3><div className="legend">{MACROS.map((m) => <span className="lg" key={m.key}><span className="sw" style={{ background: m.color }}></span>{m.label}</span>)}</div></div>
          <div className="row" style={{ gap: 8, alignItems: "baseline", marginBottom: 10 }}><span style={{ fontSize: 34, fontWeight: 800 }}>{fmt(avgCal)}</span><span style={{ fontSize: 15, fontWeight: 700, color: "var(--ink-soft)" }}>daily avg kcal · {P.loggedDays} day{P.loggedDays === 1 ? "" : "s"} logged · goal {fmt(goals.calories)}</span></div>
          {P.loggedDays ? <StackedBars labels={P.labels} intake={P.intake} goal={goals.calories} />
            : <div className="empty"><div className="e-emoji">🍽️</div><p>No meals logged in this period yet.</p></div>}
        </div>

        <div className="card pop pop-2">
          <div className="card-h"><h3>Calories burned</h3></div>
          {hasBurned ? <SimpleBars labels={P.labels} values={P.burned.map(round)} color="var(--teal)" /> : <div className="empty"><div className="e-emoji">💪</div><p>Log an activity or connect Apple Health.</p></div>}
        </div>

        <div className="card pop pop-2">
          <div className="card-h"><h3>Water intake</h3></div>
          {hasWater ? <SimpleBars labels={P.labels} values={P.water.map((w) => dispVol(w, units))} color="var(--water)" goal={dispVol(goals.water || 2000, units)} /> : <div className="empty"><div className="e-emoji">💧</div><p>Track water on the dashboard.</p></div>}
        </div>

        <div className="card pop pop-3">
          <div className="card-h"><h3>Weight</h3></div>
          <div className="row" style={{ gap: 10, alignItems: "baseline" }}><span style={{ fontSize: 36, fontWeight: 800 }}>{dispWeight(curWeight, units)}<span style={{ fontSize: 16, color: "var(--ink-soft)" }}> {wUnit(units)}</span></span><span className="pill hot">{round(progress)}% of goal</span></div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "var(--ink-soft)", margin: "5px 0 12px" }}>Goal {dispWeight(profile.goalWeight, units)} {wUnit(units)} · {shortDate(parseKey(profile.targetDate))}</div>
          <FlatWeightChart weightLog={weightLog} profile={profile} units={units} />
        </div>

        <div className="card pop pop-3">
          <div className="card-h"><h3>BMI</h3></div>
          <div className="row" style={{ gap: 12, alignItems: "center", marginBottom: 16 }}><span style={{ fontSize: 36, fontWeight: 800 }}>{bmi.toFixed(1)}</span><span className="pill warn" style={{ fontSize: 14, padding: "7px 14px" }}>{cat}</span></div>
          <BmiGauge bmi={bmi} />
          <p style={{ fontSize: 14, fontWeight: 700, color: "var(--ink-soft)", lineHeight: 1.5, marginTop: 16 }}>{bmi < 18.5 ? "You're a little under — steady fuelling helps." : bmi < 23 ? "Healthy range. Keep up the consistency!" : "Gradual loss is recommended for your range."}</p>
        </div>

        <div className="span2"><WeeklyRoundup totals={P.sums} loggedDays={P.loggedDays} periodLabel={periodLabel} /></div>
      </div>
    </>
  );
}

/* ---------------- Add modal ---------------- */
const WEB_MODE_TITLES = { menu: "Add to your day", scan: "Scan Meal", barcode: "Barcode Scan", database: "Food Database", quick: "Quick Add", ai: "AI Search", activity: "Log Activity", weight: "Log Weight", history: "Recent Foods" };
function AddModalWeb({ open, mode, setMode, onClose, onAddMeal, onAddActivity, onAddWeight, units, profile, recents, showToast, defaultMeal }) {
  return (
    <div className={"web-modal-scrim" + (open ? " show" : "")} onClick={onClose}>
      <div className="web-modal" onClick={(e) => e.stopPropagation()}>
        <div className="web-modal-h">
          {mode && mode !== "menu" ? <button className="iconbtn" onClick={() => setMode("menu")}>{I.back()}</button> : <span style={{ width: 40 }}></span>}
          <h3>{WEB_MODE_TITLES[mode] || "Add"}</h3>
          <button className="iconbtn" onClick={onClose}>{I.x()}</button>
        </div>
        <div className="web-modal-body">
          {(!mode || mode === "menu") && (
            <div className="pop">
              <div className="qa-grid">
                <button className="qa" onClick={() => setMode("scan")}><span className="ico">{I.camera()}</span><span>Scan Meal</span></button>
                <button className="qa" onClick={() => setMode("barcode")}><span className="ico">{I.barcode()}</span><span>Barcode</span></button>
                <button className="qa" onClick={() => setMode("database")}><span className="ico">{I.search()}</span><span>Database</span></button>
                <button className="qa" onClick={() => setMode("quick")}><span className="ico">{I.plus()}</span><span>Quick Add</span></button>
              </div>
              <div className="qa-wide">
                <button className="qa-card" onClick={() => setMode("activity")}><span className="ico" style={{ background: "var(--carbs-wash)", color: "var(--teal)" }}>{I.dumbbell()}</span><span>Activity</span></button>
                <button className="qa-card" onClick={() => setMode("ai")}><span className="ico" style={{ background: "var(--accent-wash)", color: "var(--accent)" }}>{I.sparkle()}</span><span>AI Search</span></button>
                <button className="qa-card" onClick={() => setMode("weight")}><span className="ico" style={{ background: "var(--yellow-wash)", color: "var(--yellow-d)" }}>{I.scale()}</span><span>Weight</span></button>
                <button className="qa-card" onClick={() => setMode("history")}><span className="ico" style={{ background: "var(--water-wash)", color: "var(--water)" }}>{I.history()}</span><span>History</span></button>
              </div>
            </div>
          )}
          {mode === "scan" && <ScanMeal onConfirm={onAddMeal} showToast={showToast} defaultMeal={defaultMeal} />}
          {mode === "barcode" && <BarcodeScan onConfirm={onAddMeal} showToast={showToast} defaultMeal={defaultMeal} />}
          {mode === "database" && <FoodDatabase onConfirm={onAddMeal} showToast={showToast} defaultMeal={defaultMeal} />}
          {mode === "quick" && <QuickAdd onConfirm={onAddMeal} showToast={showToast} defaultMeal={defaultMeal} />}
          {mode === "ai" && <AISearch onConfirm={onAddMeal} showToast={showToast} defaultMeal={defaultMeal} />}
          {mode === "activity" && <ActivityLog profile={profile} onConfirm={onAddActivity} showToast={showToast} />}
          {mode === "weight" && <WeightLog profile={profile} units={units} onConfirm={onAddWeight} showToast={showToast} />}
          {mode === "history" && <HistoryList recents={recents} onConfirm={onAddMeal} showToast={showToast} defaultMeal={defaultMeal} />}
        </div>
      </div>
    </div>
  );
}

/* ---------------- Root ---------------- */
function DesktopApp() {
  const [theme, setTheme] = usePersisted("meow.theme", "light");
  const [units, setUnits] = usePersisted("meow.units", "metric");
  const [onboarded, setOnboarded] = usePersisted("meow.onboarded", false);
  const [profile, setProfile] = usePersisted("meow.profile", DEFAULT_PROFILE);
  const [goals, setGoals] = usePersisted("meow.goals", DEFAULT_GOALS);
  const [mealsByDay, setMealsByDay] = usePersisted("meow.meals", {});
  const [waterByDay, setWaterByDay] = usePersisted("meow.water", {});
  const [activityByDay, setActivityByDay] = usePersisted("meow.activity", {});
  const [weightLog, setWeightLog] = usePersisted("meow.weightlog", []);
  const [health, setHealth] = usePersisted("meow.health", {});
  const [seeded, setSeeded] = usePersisted("meow.seeded", false);

  useEffect(() => {
    if (seeded) return;
    if (!Object.keys(mealsByDay).length) setMealsByDay(SEED_MEALS);
    if (!Object.keys(waterByDay).length) setWaterByDay(SEED_WATER);
    if (!weightLog.length) setWeightLog(SEED_WEIGHT);
    setSeeded(true);
  }, []);

  const [tab, setTab] = useState("dashboard");
  const [diaryDay, setDiaryDay] = useState(dkey(TODAY));
  const [modalOpen, setModalOpen] = useState(false);
  const [modalMode, setModalMode] = useState("menu");
  const [pendingMeal, setPendingMeal] = useState(null);
  const [chatOpen, setChatOpen] = useState(false);
  const [chatSeed, setChatSeed] = useState(null);
  const [toastNode, showToast] = useToast();
  const openChat = (seed) => { setChatSeed(typeof seed === "string" ? seed : null); setChatOpen(true); };

  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); document.body.classList.add("web"); }, [theme]);

  const today = dkey(TODAY);
  const todayMeals = mealsByDay[today] || [];
  const todayTotals = sumMeals(todayMeals);
  const todayWater = waterByDay[today] || 0;
  const todayActivity = (activityByDay[today] || []).reduce((a, x) => a + (x.kcal || 0), 0) + syncedActivity(health).kcal;
  const diaryMeals = mealsByDay[diaryDay] || [];
  const diaryTotals = sumMeals(diaryMeals);

  const recents = useMemo(() => {
    const all = Object.keys(mealsByDay).sort().reverse().flatMap((k) => mealsByDay[k]);
    const seen = new Set(); const out = [];
    for (const m of all) { if (!seen.has(m.name)) { seen.add(m.name); out.push(m); } if (out.length >= 12) break; }
    return out;
  }, [mealsByDay]);

  const streak = useMemo(() => {
    const logged = Object.keys(mealsByDay).filter((k) => (mealsByDay[k] || []).length > 0).sort();
    let cur = 0; let d = new Date(TODAY);
    while (logged.includes(dkey(d))) { cur++; d = addDays(d, -1); }
    return { current: cur, longestMeal: Math.max(cur, logged.length ? 1 : 0), longestWeight: weightLog.length > 1 ? weightLog.length : 0, loggedDays: logged };
  }, [mealsByDay, weightLog]);

  function openModal(mode = "menu") { if (mode === "menu") setPendingMeal(null); setModalMode(mode); setModalOpen(true); }
  function closeModal() { setModalOpen(false); setTimeout(() => { setModalMode("menu"); setPendingMeal(null); }, 240); }
  function addMeal(m) { const dk = tab === "diary" ? diaryDay : today; setMealsByDay((s) => ({ ...s, [dk]: [...(s[dk] || []), m] })); closeModal(); }
  function deleteMeal(id, day) { const dk = day || diaryDay; setMealsByDay((s) => ({ ...s, [dk]: (s[dk] || []).filter((x) => x.id !== id) })); }
  function addActivity(a) { const dk = tab === "diary" ? diaryDay : today; setActivityByDay((s) => ({ ...s, [dk]: [...(s[dk] || []), a] })); closeModal(); }
  function deleteActivity(id, day) { const dk = day || diaryDay; setActivityByDay((s) => ({ ...s, [dk]: (s[dk] || []).filter((x) => x.id !== id) })); }
  function addWeight(w) { setWeightLog((l) => [...l.filter((x) => x.date !== w.date), w].sort((a, b) => a.date.localeCompare(b.date))); setProfile((p) => ({ ...p, weight: w.kg })); closeModal(); }
  function go(dest) { if (dest === "weight") openModal("weight"); else if (dest === "ai") openModal("ai"); }
  function logFor(mealType) { setPendingMeal(mealType); setModalMode("database"); setModalOpen(true); }

  if (!onboarded) {
    return (
      <LaptopFrame profile={profile}>
        <div className="ob-web-wrap">
          <div className="ob-web">
            <Onboarding bare units={units} setUnits={setUnits} onDone={(p, g) => { setProfile(p); setGoals(g); setOnboarded(true); }} />
          </div>
        </div>
      </LaptopFrame>
    );
  }

  const TITLES = { dashboard: "Dashboard", diary: "Diary", insight: "Insight", account: "Account" };
  return (
    <LaptopFrame profile={profile}>
      <div className="web-app">
        <Sidebar tab={tab} setTab={setTab} onAdd={() => openModal("menu")} onAskAI={() => openChat()} profile={profile} units={units} setUnits={setUnits} theme={theme} setTheme={setTheme} />
        <div className="web-main">
          <div className="web-page">
            {tab !== "account" && (
              <TopBar title={TITLES[tab]} date={tab === "dashboard" ? prettyDate(TODAY) : tab === "diary" ? shortDate(parseKey(diaryDay)) : "Your weekly trends"}
                streak={tab === "dashboard" ? streak.current : null} onAskAI={() => openChat()} />
            )}
            {tab === "dashboard" && <DashboardWeb profile={profile} goals={goals} totals={todayTotals} water={todayWater} setWater={(n) => setWaterByDay((s) => ({ ...s, [today]: n }))} activity={todayActivity} weightLog={weightLog} streak={streak} units={units} foodIdea={DEFAULT_IDEA} go={go} />}
            {tab === "diary" && <DiaryWeb day={diaryDay} setDay={setDiaryDay} meals={diaryMeals} goals={goals} totals={diaryTotals} onDelete={(id) => deleteMeal(id, diaryDay)} onLogFor={logFor} units={units} markedDays={new Set(streak.loggedDays)} activities={activityByDay[diaryDay] || []} onLogActivity={() => openModal("activity")} onDeleteActivity={(id) => deleteActivity(id, diaryDay)} />}
            {tab === "insight" && <InsightWeb mealsByDay={mealsByDay} goals={goals} profile={profile} weightLog={weightLog} waterByDay={waterByDay} activityByDay={activityByDay} units={units} health={health} />}
            {tab === "account" && (
              <div style={{ maxWidth: 640, margin: "0 auto" }}>
                <Account profile={profile} setProfile={setProfile} goals={goals} setGoals={setGoals} units={units} setUnits={setUnits} theme={theme} setTheme={setTheme} showToast={showToast} onOpenChat={openChat} health={health} setHealth={setHealth} />
              </div>
            )}
          </div>
        </div>
        <AddModalWeb open={modalOpen} mode={modalMode} setMode={setModalMode} onClose={closeModal} onAddMeal={addMeal} onAddActivity={addActivity} onAddWeight={addWeight} units={units} profile={profile} recents={recents} showToast={showToast} defaultMeal={pendingMeal} />
        <MeowChat open={chatOpen} onClose={() => setChatOpen(false)} seed={chatSeed} profile={profile} goals={goals} />
        {toastNode}
      </div>
    </LaptopFrame>
  );
}

ReactDOM.createRoot(document.getElementById("stage")).render(<DesktopApp />);


  </script>
</body>
</html>
